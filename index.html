<!DOCTYPE html>
<html lang="en" data-mode="system">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">

<title>Home -- Branson &#x27;26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700;800&family=Atkinson+Hyperlegible:wght@400;700&display=swap">
<link rel="preload" href="js/site.js?v=202604291357" as="script">
<link rel="stylesheet" href="css/tokens.css?v=202604291357">
<link rel="stylesheet" href="css/themes/trail.css?v=202604291357" id="theme-css">
<link rel="stylesheet" href="css/components.css?v=202604291357">
<link rel="prefetch" href="data.json">
<script>/* Theme loader -- inline to prevent flash-of-wrong-theme */
(function(){
  var m = localStorage.getItem('vacdash:v1:mode') || 'system';
  document.documentElement.setAttribute('data-mode', m);
  var t = localStorage.getItem('vacdash:v1:theme');
  if (t && t !== 'trail') {
    var link = document.getElementById('theme-css');
    if (link) link.setAttribute('href', link.getAttribute('href').replace(/themes\/[^/]+\.css/, 'themes/' + t + '.css'));
  }
})();
</script>
<style>
.event-card {
  background: var(--color-surface);
  border: 1.5px solid var(--color-line);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-1);
  overflow: hidden;
  margin-bottom: 12px;
}
.event-card > summary {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  cursor: pointer;
  list-style: none;
  gap: 12px;
}
.event-card > summary::-webkit-details-marker { display: none; }
.event-card > summary:hover { background: color-mix(in srgb, var(--color-bg) 60%, transparent); }
.event-card__title { font-family: var(--font-display); font-weight: 700; font-size: var(--text-base); color: var(--color-ink); }
.event-card__meta { font-size: var(--text-sm); color: var(--color-ink-dim); margin-top: 2px; }
.event-card__chips { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.event-card__body {
  padding: 0 18px 18px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  font-size: var(--text-sm);
}
@media (min-width: 720px) { .event-card__body { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 480px) { .legend-grid { grid-template-columns: repeat(4, auto); } }
.event-card__group-title { font-weight: 700; margin-bottom: 6px; }
.event-card__name { padding: 2px 0; color: var(--color-ink-dim); }
.event-card__none { color: var(--color-ink-dim); opacity: 0.5; font-style: italic; }
</style>
</head>
<body>
<script src="js/site.js?v=202604291357"></script>
<main class="page-main">
  <div class="page-hero">
    <h1>Upcoming Activities</h1>
    <p class="hero-sub">28 events across May 23–28. Tap any event to see who's in.</p>
  </div>

  <div class="legend-grid" style="display:grid;grid-template-columns:repeat(2,auto);gap:8px;width:fit-content;margin:0 auto 16px;padding:12px 18px;background:var(--color-surface);border:1px solid var(--color-line);border-radius:var(--radius-card);">
    <span class="minichip" style="color:var(--status-yes);border-color:color-mix(in srgb,var(--status-yes) 35%,var(--color-line))">✓ Interested</span>
    <span class="minichip" style="color:var(--warn);border-color:color-mix(in srgb,var(--warn) 35%,var(--color-line))">? Undecided</span>
    <span class="minichip" style="color:var(--status-no);border-color:color-mix(in srgb,var(--status-no) 35%,var(--color-line))">✗ Not Interested</span>
    <span class="minichip" style="color:var(--color-ink-dim);border-color:color-mix(in srgb,var(--color-ink-dim) 35%,var(--color-line))">– No Response</span>
  </div>

  <div style="margin-bottom:18px;">
    <button onclick="toggleAll()" id="toggle-btn" style="display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:var(--radius-btn);background:var(--color-surface);border:1.5px solid var(--color-line);font-family:var(--font-display);font-weight:700;font-size:14px;cursor:pointer;color:var(--color-ink);">
      <span id="toggle-text">Collapse All</span>
    </button>
  </div>

  <div id="events-list"></div>

    <script>
        let INITIAL_VISIBLE = 6;
        let showingAll = false;

        const attendees = ["Adrian","Alex","Ashlyn","Bee","Brian","Bug","David","Dez","Evie","Georgie","Jackson","Jacob","Jordan","Josh","Kevin","Lucy","McKinley","Mel","Mycah","Natalie","Rachel","Ray","Simran","Skylar","Tayden","Zach"].sort();

        let eventsData = [];

        let allExpanded = true;

        function toggleAll() {
            allExpanded = !allExpanded;
            const btn = document.getElementById('toggle-btn');
            const text = document.getElementById('toggle-text');
            text.textContent = allExpanded ? 'Collapse All' : 'Expand All';
            document.querySelectorAll('details.event-card').forEach(details => {
                details.open = allExpanded;
            });
        }

        function applyVisibilityState(showAll) {
            const cards = document.querySelectorAll('details.event-card');
            if (showAll) {
                cards.forEach(card => card.hidden = false);
                document.querySelectorAll('.day-section').forEach(sec => sec.hidden = false);
            } else {
                cards.forEach((card, i) => card.hidden = i >= INITIAL_VISIBLE);
                document.querySelectorAll('.day-section').forEach(sec => {
                    const sectionCards = sec.querySelectorAll('.event-card');
                    sec.hidden = Array.from(sectionCards).every(c => c.hidden);
                });
            }
        }

        function render() {
            const existingBtn = document.getElementById('show-all-btn');
            if (existingBtn) existingBtn.parentNode.remove();

            const eventsDiv = document.getElementById('events-list');
            eventsDiv.innerHTML = '';

            const DATE_LABELS = {
                '2026-05-23': 'May 23 \u2014 Saturday',
                '2026-05-24': 'May 24 \u2014 Sunday',
                '2026-05-25': 'May 25 \u2014 Monday',
                '2026-05-26': 'May 26 \u2014 Tuesday',
                '2026-05-27': 'May 27 \u2014 Wednesday',
                '2026-05-28': 'May 28 \u2014 Thursday'
            };

            const groups = [];
            const dateMap = new Map();
            eventsData.forEach(event => {
                if (!dateMap.has(event.date)) {
                    dateMap.set(event.date, []);
                    groups.push([event.date, dateMap.get(event.date)]);
                }
                dateMap.get(event.date).push(event);
            });

            groups.forEach(([date, dayEvents], idx) => {
                const section = document.createElement('div');
                section.className = 'day-section';
                const bgColor = idx % 2 === 0
                    ? 'color-mix(in srgb, var(--moss) 8%, var(--color-bg))'
                    : 'color-mix(in srgb, var(--sand) 10%, var(--color-bg))';
                section.style.cssText = `background: ${bgColor}; border-radius: var(--radius-card); padding: 16px 12px 8px; margin-bottom: 20px`;

                const label = document.createElement('span');
                label.textContent = `\uD83D\uDCC5 ${DATE_LABELS[date] || date}`;
                label.style.cssText = 'font-family: var(--font-display); font-size: var(--text-sm); font-weight: 700; opacity: 0.45; display: block; margin-bottom: 10px; padding-left: 2px';
                section.appendChild(label);

                dayEvents.forEach(event => {
                    const yesStyle = 'color:var(--status-yes);border-color:color-mix(in srgb,var(--status-yes) 35%,var(--color-line))';
                    const warnStyle = 'color:var(--warn);border-color:color-mix(in srgb,var(--warn) 35%,var(--color-line))';
                    const noStyle = 'color:var(--status-no);border-color:color-mix(in srgb,var(--status-no) 35%,var(--color-line))';
                    const nameCell = (n) => `<div class="event-card__name">${n}</div>`;
                    const noneCell = '<div class="event-card__none">(none)</div>';

                    const cardEl = document.createElement('details');
                    cardEl.className = 'event-card';
                    cardEl.setAttribute('open', '');
                    cardEl.innerHTML = `
                        <summary>
                            <div>
                                <div class="event-card__title">${event.title}</div>
                                <div class="event-card__meta">${event.date} \u2022 ${event.priority} priority</div>
                            </div>
                            <div class="event-card__chips">
                                <span class="minichip" style="${yesStyle}">\u2713 ${event.interested.length}</span>
                                <span class="minichip" style="${warnStyle}">? ${event.undecided.length}</span>
                                <span class="minichip" style="${noStyle}">\u2717 ${event.notInterested.length}</span>
                                <span class="minichip" style="color:var(--color-ink-dim);border-color:color-mix(in srgb,var(--color-ink-dim) 35%,var(--color-line))">\u2013 ${event.noResponse.length}</span>
                            </div>
                        </summary>
                        <div class="event-card__body">
                            <div>
                                <div class="event-card__group-title" style="color:var(--status-yes)">Interested (${event.interested.length})</div>
                                ${event.interested.map(nameCell).join('') || noneCell}
                            </div>
                            <div>
                                <div class="event-card__group-title" style="color:var(--status-no)">Not Interested (${event.notInterested.length})</div>
                                ${event.notInterested.map(nameCell).join('') || noneCell}
                            </div>
                            <div style="border-left:1px solid var(--color-line);padding-left:16px">
                                <div class="event-card__group-title" style="color:var(--warn)">Undecided (${event.undecided.length})</div>
                                ${event.undecided.map(nameCell).join('') || noneCell}
                            </div>
                            <div>
                                <div class="event-card__group-title" style="color:var(--color-ink-dim)">No Response (${event.noResponse.length})</div>
                                ${event.noResponse.map(nameCell).join('') || noneCell}
                            </div>
                        </div>
                    `;
                    section.appendChild(cardEl);
                });

                eventsDiv.appendChild(section);
            });

            applyVisibilityState(false);

            if (eventsData.length > INITIAL_VISIBLE) {
                const showAllBtn = document.createElement('button');
                showAllBtn.id = 'show-all-btn';
                showAllBtn.textContent = 'Show All \u2193';
                showAllBtn.style.cssText = 'display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:var(--radius-btn);background:var(--color-surface);border:1.5px solid var(--color-line);font-family:var(--font-display);font-weight:700;font-size:14px;cursor:pointer;color:var(--color-ink);';
                showAllBtn.addEventListener('click', () => {
                    showingAll = !showingAll;
                    applyVisibilityState(showingAll);
                    showAllBtn.textContent = showingAll ? 'Show Fewer \u2191' : 'Show All \u2193';
                });

                const wrapper = document.createElement('div');
                wrapper.style.cssText = 'margin-top:12px;';
                wrapper.appendChild(showAllBtn);
                eventsDiv.insertAdjacentElement('afterend', wrapper);
            }
        }

        // Collapse by default on mobile only
        function setupMobileCollapse() {
            if (window.innerWidth < 768) {
                document.querySelectorAll('details.event-card').forEach(details => {
                    details.removeAttribute('open');
                });
                allExpanded = false;
                document.getElementById('toggle-text').textContent = 'Expand All';
            }
        }

        const SUPABASE_URL = 'https://quebfbvfuwbncpexlylu.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_yLlf7qoMZMfiZhNsyudX7g_HnZ8clgt';

        window.onload = () => {
            fetch('schedule.json')
                .then(r => r.json())
                .then(async data => {
                    eventsData = data.events;
                    try {
                        const overridesPromise = fetch(
                            `${SUPABASE_URL}/rest/v1/schedule_overrides?select=event_id,field,new_value`,
                            { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
                        ).then(r => r.json());
                        const overrides = await Promise.race([
                            overridesPromise,
                            new Promise(resolve => setTimeout(() => resolve([]), 800))
                        ]);
                        if (Array.isArray(overrides)) {
                            overrides.forEach(ov => {
                                const ev = eventsData.find(e => e.id === ov.event_id);
                                if (ev && ev.hasOwnProperty(ov.field)) {
                                    ev[ov.field] = typeof ev[ov.field] === 'number'
                                        ? parseFloat(ov.new_value)
                                        : ov.new_value;
                                }
                            });
                        }
                    } catch (e) { /* silently proceed with original events */ }
                    render();
                    document.querySelector('.hero-sub').textContent =
                        `${eventsData.length} events across May 23–28. Tap any event to see who's in.`;
                    setupMobileCollapse();
                })
                .catch(err => console.error('Failed to load schedule.json:', err));
            window.addEventListener('resize', setupMobileCollapse);
        };
    </script>
</main>
</body>
</html>
