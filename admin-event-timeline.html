<!DOCTYPE html>
<html lang="en" data-mode="system">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">

<title>Timeline -- Branson &#x27;26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700;800&family=Atkinson+Hyperlegible:wght@400;700&display=swap">
<link rel="preload" href="js/site.js?v=202605020920" as="script">
<link rel="stylesheet" href="css/tokens.css?v=202605020920">
<link rel="stylesheet" href="css/themes/trail.css?v=202605020920" id="theme-css">
<link rel="stylesheet" href="css/components.css?v=202605020920">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>/* Theme loader -- inline to prevent flash-of-wrong-theme */
(function(){
  var m = localStorage.getItem('vacdash:v1:mode') || 'system';
  document.documentElement.setAttribute('data-mode', m);
  var t = localStorage.getItem('vacdash:v1:theme');
  if (t && t !== 'trail') {
    var link = document.getElementById('theme-css');
    if (link) link.setAttribute('href', link.getAttribute('href').replace(/themes\/[^/]+\.css/, 'themes/' + t + '.css'));
  }
})();
</script>
<style>
.event-card {
  background: var(--color-surface);
  border: 1.5px solid var(--color-line);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-1);
  overflow: hidden;
  margin-bottom: 12px;
}
.event-card > summary {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  cursor: pointer;
  list-style: none;
  gap: 12px;
}
.event-card > summary::-webkit-details-marker { display: none; }
.event-card > summary:hover { background: color-mix(in srgb, var(--color-bg) 60%, transparent); }
.event-card__title { font-family: var(--font-display); font-weight: 700; font-size: var(--text-base); color: var(--color-ink); }
.event-card__meta { font-size: var(--text-sm); color: var(--color-ink-dim); margin-top: 2px; }
.event-card__chips { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; align-items: center; }
.event-card__body {
  padding: 0 18px 18px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  font-size: var(--text-sm);
}
@media (min-width: 720px) { .event-card__body { grid-template-columns: repeat(4, 1fr); } }
@media (min-width: 480px) { .legend-grid { grid-template-columns: repeat(4, auto); } }
.event-card__group-title { font-weight: 700; margin-bottom: 6px; }
.event-card__name { padding: 2px 0; color: var(--color-ink-dim); }
.event-card__none { color: var(--color-ink-dim); opacity: 0.5; font-style: italic; }
.event-card__summary-main { flex: 1; min-width: 0; }
</style>
</head>
<body>
<!-- Deprecated admin page banner -->
<div style="background:#FFF3CD;color:#856404;border-bottom:1px solid #FFECB5;padding:10px 20px;font-size:14px;text-align:center;">
  ⚠️ This admin view is deprecated. Use the <a href="event-timeline.html" style="color:#856404;font-weight:700;">main Timeline page</a> instead (edit icons appear when you're logged in).
</div>
<script src="js/site.js?v=202605020920"></script>
<main class="page-main">
  <div class="page-hero">
    <h1>Timeline</h1>
    <p class="hero-sub">25 events grouped by date, May 23–28. Duration bars scale to 6 hours max.</p>
  </div>

  <div class="legend-grid" style="display:grid;grid-template-columns:repeat(2,auto);gap:8px;width:fit-content;margin:0 auto 16px;padding:12px 18px;background:var(--color-surface);border:1px solid var(--color-line);border-radius:var(--radius-card);">
    <span class="minichip" style="color:var(--status-yes);border-color:color-mix(in srgb,var(--status-yes) 35%,var(--color-line))">✓ Interested</span>
    <span class="minichip" style="color:var(--warn);border-color:color-mix(in srgb,var(--warn) 35%,var(--color-line))">? Undecided</span>
    <span class="minichip" style="color:var(--status-no);border-color:color-mix(in srgb,var(--status-no) 35%,var(--color-line))">✗ Not Interested</span>
    <span class="minichip" style="color:var(--color-ink-dim);border-color:color-mix(in srgb,var(--color-ink-dim) 35%,var(--color-line))">– No Response</span>
  </div>

  <div style="margin-bottom:18px;">
    <button onclick="toggleAll()" id="toggle-btn" style="display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:var(--radius-btn);background:var(--color-surface);border:1.5px solid var(--color-line);font-family:var(--font-display);font-weight:700;font-size:14px;cursor:pointer;color:var(--color-ink);">
      <span id="toggle-text">Collapse All</span>
    </button>
  </div>

  <div id="timeline-list"></div>

    <script>
        let _allEvents = [];
        let _editingId = null;
        let allExpanded = true;

        function toggleAll() {
            allExpanded = !allExpanded;
            const btn = document.getElementById('toggle-btn');
            const text = document.getElementById('toggle-text');
            text.textContent = allExpanded ? 'Collapse All' : 'Expand All';
            document.querySelectorAll('details.event-card').forEach(details => {
                details.open = allExpanded;
            });
        }

        let eventsData = [];

        const maxDuration = 6;
        const yesStyle = 'color:var(--status-yes);border-color:color-mix(in srgb,var(--status-yes) 35%,var(--color-line))';
        const warnStyle = 'color:var(--warn);border-color:color-mix(in srgb,var(--warn) 35%,var(--color-line))';
        const noStyle = 'color:var(--status-no);border-color:color-mix(in srgb,var(--status-no) 35%,var(--color-line))';
        const nameCell = (n) => `<div class="event-card__name">${n}</div>`;
        const noneCell = '<div class="event-card__none">(none)</div>';

        const renderCard = (event) => {
                const pct = Math.min((event.duration / maxDuration) * 100, 100);
                return `
                    <details class="event-card" style="position:relative">
                        <summary>
                            <div class="event-card__summary-main">
                                <div class="event-card__title">${event.title}</div>
                                <div class="event-card__meta">${event.duration}h • ${event.priority} priority</div>
                                <div class="duration-bar-wrap" style="margin-top:6px;height:6px;border-radius:var(--radius-pill);background:var(--color-line);overflow:hidden;">
                                    <div style="height:100%;width:${pct}%;background:var(--status-yes);border-radius:var(--radius-pill);"></div>
                                </div>
                            </div>
                            <div class="event-card__chips">
                                <span class="minichip" style="${yesStyle};font-size:13px;font-weight:800;">✓ ${event.interested.length}</span>
                                <span class="minichip" style="${warnStyle}">? ${event.undecided.length}</span>
                                <span class="minichip" style="${noStyle}">✗ ${event.notInterested.length}</span>
                                <span class="minichip" style="color:var(--color-ink-dim);border-color:color-mix(in srgb,var(--color-ink-dim) 35%,var(--color-line))">– ${event.noResponse.length}</span>
                            </div>
                        </summary>
                        <div class="event-card__body">
                            <div>
                                <div class="event-card__group-title" style="color:var(--status-yes)">Interested (${event.interested.length})</div>
                                ${event.interested.map(nameCell).join('') || noneCell}
                            </div>
                            <div>
                                <div class="event-card__group-title" style="color:var(--status-no)">Not Interested (${event.notInterested.length})</div>
                                ${event.notInterested.map(nameCell).join('') || noneCell}
                            </div>
                            <div style="border-left:1px solid var(--color-line);padding-left:16px">
                                <div class="event-card__group-title" style="color:var(--warn)">Undecided (${event.undecided.length})</div>
                                ${event.undecided.map(nameCell).join('') || noneCell}
                            </div>
                            <div>
                                <div class="event-card__group-title" style="color:var(--color-ink-dim)">No Response (${event.noResponse.length})</div>
                                ${event.noResponse.map(nameCell).join('') || noneCell}
                            </div>
                        </div>
                        <button data-event-id="${event.id}" onclick="openEditModal(this)" style="position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;font-size:1.2rem;">✏️</button>
                    </details>
                `;
        };

        function render() {
            const container = document.getElementById('timeline-list');
            const dayLabels = {
                '2026-05-23': 'May 23 — Saturday',
                '2026-05-24': 'May 24 — Sunday',
                '2026-05-25': 'May 25 — Monday',
                '2026-05-26': 'May 26 — Tuesday',
                '2026-05-27': 'May 27 — Wednesday',
                '2026-05-28': 'May 28 — Thursday'
            };

            const groups = {};
            eventsData.forEach(ev => {
                if (!groups[ev.date]) groups[ev.date] = [];
                groups[ev.date].push(ev);
            });
            const dates = Object.keys(groups).sort();

            container.innerHTML = dates.map(date => {
                const label = dayLabels[date] || date;
                const cards = groups[date].map(renderCard).join('');
                return `
                    <h2 style="font-family:var(--font-display);font-weight:800;font-size:var(--text-lg);color:var(--color-ink);margin:24px 0 10px;border-bottom:2px solid var(--color-line);padding-bottom:6px;">📅 ${label}</h2>
                    ${cards}
                `;
            }).join('');
        }

        function setupMobileCollapse() {
            if (window.innerWidth < 768) {
                document.querySelectorAll('details.event-card').forEach(details => {
                    details.removeAttribute('open');
                });
                allExpanded = false;
                document.getElementById('toggle-text').textContent = 'Expand All';
            }
        }

        const SUPABASE_URL = 'https://quebfbvfuwbncpexlylu.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_yLlf7qoMZMfiZhNsyudX7g_HnZ8clgt';

        (async () => {
          const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
          const { data: { session } } = await sbClient.auth.getSession();
          if (!session) window.location.replace('admin.html');
        })();

        async function loadSchedule() {
            const container = document.getElementById('timeline-list');
            let loaded = false;

            try {
                const resp = await fetch(`${SUPABASE_URL}/rest/v1/schedule_events?select=*`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                });
                if (resp.ok) {
                    const data = await resp.json();
                    if (Array.isArray(data) && data.length > 0) {
                        eventsData = data;
                        _allEvents = eventsData;
                        loaded = true;
                    }
                }
            } catch (e) {}

            if (!loaded) {
                try {
                    const r = await fetch('schedule.json');
                    const json = await r.json();
                    eventsData = json.events;
                    _allEvents = eventsData;
                    loaded = true;
                } catch (e) {}
            }

            if (!loaded) {
                container.innerHTML = '<p id="retry-msg">Tap to retry</p>';
                document.getElementById('retry-msg').addEventListener('click', loadSchedule);
                return;
            }

            render();
            setupMobileCollapse();
        }

        function openEditModal(btn) {
          const id = btn.dataset.eventId;
          const ev = _allEvents.find(e => String(e.id) === String(id));
          if (!ev) return;
          _editingId = id;
          document.getElementById('ef-title').value = ev.title || '';
          document.getElementById('ef-date').value = ev.date || '';
          document.getElementById('ef-startTime').value = ev.startTime || '';
          document.getElementById('ef-duration').value = ev.duration ?? '';
          document.getElementById('ef-travelMinutes').value = ev.travelMinutes ?? '';
          document.getElementById('ef-priority').value = ev.priority || '';
          document.getElementById('ef-catalogRef').value = ev.catalogRef || '';
          document.getElementById('ef-interested').value = (ev.interested || []).join(', ');
          document.getElementById('ef-undecided').value = (ev.undecided || []).join(', ');
          document.getElementById('ef-notInterested').value = (ev.notInterested || []).join(', ');
          document.getElementById('ef-noResponse').value = (ev.noResponse || []).join(', ');
          document.getElementById('edit-modal-error').style.display = 'none';
          document.getElementById('edit-modal').style.display = 'flex';
        }

        window.onload = () => {
            loadSchedule();
            window.addEventListener('resize', setupMobileCollapse);

            document.getElementById('edit-save').addEventListener('click', async () => {
              const title         = document.getElementById('ef-title').value.trim();
              const date          = document.getElementById('ef-date').value.trim();
              const startTime     = document.getElementById('ef-startTime').value.trim();
              const duration      = parseInt(document.getElementById('ef-duration').value, 10);
              const travelMinutes = parseInt(document.getElementById('ef-travelMinutes').value, 10);
              const priority      = document.getElementById('ef-priority').value.trim();
              const catalogRef    = document.getElementById('ef-catalogRef').value.trim();
              const interested    = document.getElementById('ef-interested').value.split(',').map(s => s.trim()).filter(Boolean);
              const undecided     = document.getElementById('ef-undecided').value.split(',').map(s => s.trim()).filter(Boolean);
              const notInterested = document.getElementById('ef-notInterested').value.split(',').map(s => s.trim()).filter(Boolean);
              const noResponse    = document.getElementById('ef-noResponse').value.split(',').map(s => s.trim()).filter(Boolean);

              const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
              const { error } = await sbClient.from('schedule_events').upsert({
                id: _editingId, title, date, startTime, duration, travelMinutes,
                priority, catalogRef, interested, undecided, notInterested, noResponse
              });

              if (error) {
                const errDiv = document.getElementById('edit-modal-error');
                errDiv.textContent = error.message || 'Save failed.';
                errDiv.style.display = 'block';
                return;
              }

              const idx = _allEvents.findIndex(e => String(e.id) === String(_editingId));
              if (idx !== -1) {
                _allEvents[idx] = { ..._allEvents[idx], title, date, startTime, duration, travelMinutes,
                  priority, catalogRef, interested, undecided, notInterested, noResponse };
              }

              const oldBtn = document.querySelector('button[data-event-id="' + _editingId + '"]');
              if (oldBtn && idx !== -1) {
                const oldCard = oldBtn.parentElement;
                const ev2 = _allEvents[idx];
                const maxDuration2 = 6;
                const pct2 = Math.min((ev2.duration / maxDuration2) * 100, 100);
                const yesStyle2 = 'color:var(--status-yes);border-color:color-mix(in srgb,var(--status-yes) 35%,var(--color-line))';
                const warnStyle2 = 'color:var(--warn);border-color:color-mix(in srgb,var(--warn) 35%,var(--color-line))';
                const noStyle2 = 'color:var(--status-no);border-color:color-mix(in srgb,var(--status-no) 35%,var(--color-line))';
                const nameCell2 = (n) => `<div class="event-card__name">${n}</div>`;
                const noneCell2 = '<div class="event-card__none">(none)</div>';
                const newCardHTML = renderCard(_allEvents[idx]);
                oldCard.outerHTML = newCardHTML;
              }

              document.getElementById('edit-modal').style.display = 'none';
            });

            document.getElementById('edit-cancel').addEventListener('click', () => {
              document.getElementById('edit-modal').style.display = 'none';
            });
        };
    </script>
</main>

<div id="edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:8px;padding:24px;width:min(480px,90vw);max-height:90vh;overflow-y:auto;position:relative;">
    <form id="edit-form" onsubmit="return false;">
      <label style="display:block;margin-bottom:8px;">Title<br><input id="ef-title" type="text" style="width:100%;box-sizing:border-box;"></label>
      <label style="display:block;margin-bottom:8px;">Date<br><input id="ef-date" type="text" style="width:100%;box-sizing:border-box;"></label>
      <label style="display:block;margin-bottom:8px;">Start Time<br><input id="ef-startTime" type="text" style="width:100%;box-sizing:border-box;"></label>
      <label style="display:block;margin-bottom:8px;">Duration<br><input id="ef-duration" type="number" style="width:100%;box-sizing:border-box;"></label>
      <label style="display:block;margin-bottom:8px;">Travel Minutes<br><input id="ef-travelMinutes" type="number" style="width:100%;box-sizing:border-box;"></label>
      <label style="display:block;margin-bottom:8px;">Priority<br><input id="ef-priority" type="text" style="width:100%;box-sizing:border-box;"></label>
      <label style="display:block;margin-bottom:8px;">Catalog Ref<br><input id="ef-catalogRef" type="text" style="width:100%;box-sizing:border-box;"></label>
      <label style="display:block;margin-bottom:8px;">Interested (comma-separated)<br><input id="ef-interested" type="text" style="width:100%;box-sizing:border-box;"></label>
      <label style="display:block;margin-bottom:8px;">Undecided (comma-separated)<br><input id="ef-undecided" type="text" style="width:100%;box-sizing:border-box;"></label>
      <label style="display:block;margin-bottom:8px;">Not Interested (comma-separated)<br><input id="ef-notInterested" type="text" style="width:100%;box-sizing:border-box;"></label>
      <label style="display:block;margin-bottom:8px;">No Response (comma-separated)<br><input id="ef-noResponse" type="text" style="width:100%;box-sizing:border-box;"></label>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button id="edit-save" type="button" style="flex:1;padding:8px;cursor:pointer;">Save</button>
        <button id="edit-cancel" type="button" style="flex:1;padding:8px;cursor:pointer;">Cancel</button>
      </div>
      <div id="edit-modal-error" style="display:none;color:red;margin-top:8px;"></div>
    </form>
  </div>
</div>
</body>
</html>
