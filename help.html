<!doctype html>
<html lang="en" data-mode="system">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<meta name="description" content="Help and FAQ for the Branson 2026 family vacation dashboard">
<title>Help -- Branson &#x27;26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700;800&family=Atkinson+Hyperlegible:wght@400;700&display=swap">
<link rel="preload" href="js/site.js?v=202604281233" as="script">
<link rel="stylesheet" href="css/tokens.css?v=202604281233">
<link rel="stylesheet" href="css/themes/trail.css?v=202604281233" id="theme-css">
<link rel="stylesheet" href="css/components.css?v=202604281233">
<script>/* Theme loader -- inline to prevent flash-of-wrong-theme */
(function(){
  var m = localStorage.getItem('vacdash:v1:mode') || 'system';
  document.documentElement.setAttribute('data-mode', m);
  var t = localStorage.getItem('vacdash:v1:theme');
  if (t && t !== 'trail') {
    var link = document.getElementById('theme-css');
    if (link) link.setAttribute('href', link.getAttribute('href').replace(/themes\/[^/]+\.css/, 'themes/' + t + '.css'));
  }
})();
</script>
</head>
<body>
<script src="js/site.js?v=202604281233"></script>
<main class="page-main" id="help-main">
  <div class="page-hero">
    <h1>Help</h1>
    <p class="hero-sub">How to use the Branson '26 dashboard.</p>
  </div>
  <div id="help-sections"></div>
</main>

<script>
(function () {
  function parseBody(text) {
    // Split on double newline for paragraphs
    var parts = text.split(/\n\n+/);
    return parts.map(function (part) {
      var lines = part.split('\n');
      // Detect bullet list block
      var isList = lines.every(function (l) { return l.trim() === '' || l.startsWith('- '); });
      if (isList) {
        var items = lines.filter(function (l) { return l.startsWith('- '); });
        return '<ul>' + items.map(function (l) {
          return '<li>' + inlineMd(l.slice(2)) + '</li>';
        }).join('') + '</ul>';
      }
      return '<p class="help">' + inlineMd(part) + '</p>';
    }).join('');
  }

  function inlineMd(text) {
    // **bold** only
    return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  }

  function render(data) {
    var container = document.getElementById('help-sections');
    if (!container) return;
    container.innerHTML = data.sections.map(function (s) {
      return '<section class="profile-section" id="' + s.id + '" aria-labelledby="h-' + s.id + '">'
        + '<h2 id="h-' + s.id + '">' + s.heading + '</h2>'
        + parseBody(s.body)
        + '</section>';
    }).join('');
  }

  function showError() {
    var container = document.getElementById('help-sections');
    if (container) {
      container.innerHTML = '<section class="profile-section"><p class="help">Help content could not be loaded. Ask Alex for assistance.</p></section>';
    }
  }

  fetch('help.json')
    .then(function (r) { if (!r.ok) throw new Error('fetch failed'); return r.json(); })
    .then(render)
    .catch(showError);
})();
</script>
</body>
</html>
