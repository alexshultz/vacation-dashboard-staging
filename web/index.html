<!DOCTYPE html>
<html lang="en" data-mode="system">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">

<title>Home -- Branson &#x27;26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700;800&family=Atkinson+Hyperlegible:wght@400;700&display=swap">
<link rel="preload" href="js/site.js" as="script">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/themes/trail.css" id="theme-css">
<link rel="stylesheet" href="css/components.css">
<link rel="prefetch" href="data.json">
<script>/* Theme loader -- inline to prevent flash-of-wrong-theme */
(function(){
  var m = localStorage.getItem('vacdash:v1:mode') || 'system';
  document.documentElement.setAttribute('data-mode', m);
  var t = localStorage.getItem('vacdash:v1:theme');
  if (t && t !== 'trail') {
    var link = document.getElementById('theme-css');
    if (link) link.setAttribute('href', link.getAttribute('href').replace(/themes\/[^/]+\.css/, 'themes/' + t + '.css'));
  }
})();
</script>
<style>
.event-card {
  background: var(--color-surface);
  border: 1.5px solid var(--color-line);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-1);
  overflow: hidden;
  margin-bottom: 12px;
}
.event-card > summary {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  cursor: pointer;
  list-style: none;
  gap: 12px;
}
.event-card > summary::-webkit-details-marker { display: none; }
.event-card > summary:hover { background: color-mix(in srgb, var(--color-bg) 60%, transparent); }
.event-card__title { font-family: var(--font-display); font-weight: 700; font-size: var(--text-base); color: var(--color-ink); }
.event-card__meta { font-size: var(--text-sm); color: var(--color-ink-dim); margin-top: 2px; }
.event-card__chips { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.event-card__body {
  padding: 0 18px 18px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  font-size: var(--text-sm);
}
@media (min-width: 720px) { .event-card__body { grid-template-columns: repeat(4, 1fr); } }
.event-card__group-title { font-weight: 700; margin-bottom: 6px; }
.event-card__name { padding: 2px 0; color: var(--color-ink-dim); }
.event-card__none { color: var(--color-ink-dim); opacity: 0.5; font-style: italic; }
</style>
</head>
<body>
<script src="js/site.js"></script>
<main class="page-main">
  <div class="page-hero">
    <h1>Events</h1>
    <p class="hero-sub">28 events across May 23–28. Tap any event to see who's in.</p>
  </div>

  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">
    <span class="minichip" style="color:var(--status-yes);border-color:color-mix(in srgb,var(--status-yes) 35%,var(--color-line))">✓ Interested</span>
    <span class="minichip" style="color:var(--warn);border-color:color-mix(in srgb,var(--warn) 35%,var(--color-line))">? Undecided</span>
    <span class="minichip" style="color:var(--status-no);border-color:color-mix(in srgb,var(--status-no) 35%,var(--color-line))">✗ Not Interested</span>
    <span class="minichip">– No Response</span>
  </div>

  <div style="margin-bottom:18px;">
    <button onclick="toggleAll()" id="toggle-btn" style="display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:var(--radius-btn);background:var(--color-surface);border:1.5px solid var(--color-line);font-family:var(--font-display);font-weight:700;font-size:14px;cursor:pointer;color:var(--color-ink);">
      <span id="toggle-text">Collapse All</span>
    </button>
  </div>

  <div id="events-list"></div>

    <script>
        const attendees = ["Adrian","Alex","Ashlyn","Bee","Brian","Bug","David","Dez","Evie","Georgie","Jackson","Jacob","Jordan","Josh","Kevin","Lucy","McKinley","Mel","Mycah","Natalie","Rachel","Ray","Simran","Skylar","Tayden","Zach"].sort();

        let eventsData = [];

        let allExpanded = true;

        function toggleAll() {
            allExpanded = !allExpanded;
            const btn = document.getElementById('toggle-btn');
            const text = document.getElementById('toggle-text');
            text.textContent = allExpanded ? 'Collapse All' : 'Expand All';
            document.querySelectorAll('details.event-card').forEach(details => {
                details.open = allExpanded;
            });
        }

        function render() {
            const eventsDiv = document.getElementById('events-list');
            eventsDiv.innerHTML = eventsData.map(event => {
                const yesStyle = 'color:var(--status-yes);border-color:color-mix(in srgb,var(--status-yes) 35%,var(--color-line))';
                const warnStyle = 'color:var(--warn);border-color:color-mix(in srgb,var(--warn) 35%,var(--color-line))';
                const noStyle = 'color:var(--status-no);border-color:color-mix(in srgb,var(--status-no) 35%,var(--color-line))';
                const nameCell = (n) => `<div class="event-card__name">${n}</div>`;
                const noneCell = '<div class="event-card__none">(none)</div>';
                return `
                    <details class="event-card" open>
                        <summary>
                            <div>
                                <div class="event-card__title">${event.title}</div>
                                <div class="event-card__meta">${event.date} • ${event.priority} priority</div>
                            </div>
                            <div class="event-card__chips">
                                <span class="minichip" style="${yesStyle}">✓ ${event.interested.length}</span>
                                <span class="minichip" style="${warnStyle}">? ${event.undecided.length}</span>
                                <span class="minichip" style="${noStyle}">✗ ${event.notInterested.length}</span>
                                <span class="minichip">– ${event.noResponse.length}</span>
                            </div>
                        </summary>
                        <div class="event-card__body">
                            <div>
                                <div class="event-card__group-title" style="color:var(--status-yes)">Interested (${event.interested.length})</div>
                                ${event.interested.map(nameCell).join('') || noneCell}
                            </div>
                            <div>
                                <div class="event-card__group-title" style="color:var(--warn)">Undecided (${event.undecided.length})</div>
                                ${event.undecided.map(nameCell).join('') || noneCell}
                            </div>
                            <div>
                                <div class="event-card__group-title" style="color:var(--status-no)">Not Interested (${event.notInterested.length})</div>
                                ${event.notInterested.map(nameCell).join('') || noneCell}
                            </div>
                            <div>
                                <div class="event-card__group-title" style="color:var(--color-ink-dim)">No Response (${event.noResponse.length})</div>
                                ${event.noResponse.map(nameCell).join('') || noneCell}
                            </div>
                        </div>
                    </details>
                `;
            }).join('');
        }

        // Collapse by default on mobile only
        function setupMobileCollapse() {
            if (window.innerWidth < 768) {
                document.querySelectorAll('details.event-card').forEach(details => {
                    details.removeAttribute('open');
                });
                allExpanded = false;
                document.getElementById('toggle-text').textContent = 'Expand All';
            }
        }

        window.onload = () => {
            fetch('schedule.json')
                .then(r => r.json())
                .then(data => {
                    eventsData = data.events;
                    render();
                    setupMobileCollapse();
                })
                .catch(err => console.error('Failed to load schedule.json:', err));
            window.addEventListener('resize', setupMobileCollapse);
        };
    </script>
</main>
</body>
</html>
