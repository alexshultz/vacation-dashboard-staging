<!DOCTYPE html>
<html lang="en" data-mode="system">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">

<title>People -- Branson &#x27;26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700;800&family=Atkinson+Hyperlegible:wght@400;700&display=swap">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/themes/trail.css" id="theme-css">
<link rel="stylesheet" href="css/components.css">
<script>/* Theme loader -- inline to prevent flash-of-wrong-theme */
(function(){
  var m = localStorage.getItem('vacdash:v1:mode') || 'system';
  document.documentElement.setAttribute('data-mode', m);
  var t = localStorage.getItem('vacdash:v1:theme');
  if (t && t !== 'trail') {
    var link = document.getElementById('theme-css');
    if (link) link.setAttribute('href', link.getAttribute('href').replace(/themes\/[^/]+\.css/, 'themes/' + t + '.css'));
  }
})();
</script>
<style>
.attendee-link {
  display: inline-block;
  padding: 6px 0;
  color: inherit;
  text-decoration: none;
  min-height: 36px;
  line-height: 1.5;
}
.attendee-link:hover { color: var(--status-wishlist); text-decoration: underline; }
.timeline {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 4px;
  font-size: var(--text-xs);
  color: var(--color-ink-dim);
  font-weight: 600;
  margin-bottom: 20px;
}
.day { text-align: center; }
.bar-container {
  height: 10px;
  border-radius: var(--radius-pill);
  background: var(--color-line);
  overflow: hidden;
}
.bar {
  height: 100%;
  border-radius: var(--radius-pill);
  transition: width 400ms;
}
</style>
</head>
<body>
<header class="site-header">
  <div class="site-header__inner">
    <a class="site-logo" href="index.html">Branson '26</a>
    <nav class="site-nav" aria-label="Main">
      <a href="index.html" class="nav-link">Home</a>
      <a href="attractions.html" class="nav-link">Activities</a>
      <a href="wishlist.html" class="nav-link">Wishlist</a>
      <a href="suggested.html" class="nav-link">Suggested</a>
      <a href="event-timeline.html" class="nav-link">Timeline</a>
      <a href="people-timeline.html" class="nav-link" aria-current="page">People</a>
    </nav>
    <a class="header-profile-btn" href="profile.html" aria-label="Profile" id="profile-btn"><span aria-hidden="true">👤</span><span class="profile-nudge-dot" aria-hidden="true"></span></a>
    <button class="theme-toggle" aria-label="Toggle dark mode" onclick="(function(){var modes=['system','light','dark'];var m=document.documentElement.getAttribute('data-mode')||'system';var next=modes[(modes.indexOf(m)+1)%3];document.documentElement.setAttribute('data-mode',next);localStorage.setItem('vacdash:v1:mode',next);})()">☀️</button>
  </div>
</header>
<nav class="bottom-tabs" aria-label="Main navigation">
  <a href="index.html" class="tab" aria-label="Home">🏠</a>
  <a href="attractions.html" class="tab" aria-label="Activities">🎡</a>
  <a href="wishlist.html" class="tab" aria-label="Wishlist">♡</a>
  <a href="suggested.html" class="tab" aria-label="Suggested">💡</a>
  <a href="event-timeline.html" class="tab" aria-label="Timeline">📅</a>
  <a href="people-timeline.html" class="tab" aria-current="page" aria-label="People">👥</a>
</nav>
<main class="page-main">
  <div class="page-hero">
    <p class="eyebrow">Branson '26</p>
    <h1>People &amp; Timeline</h1>
    <p class="hero-sub">26 attendees • ages verified from Apple Contacts • May 22-29, 2026</p>
  </div>

  <div style="background:var(--color-surface);border:1.5px solid var(--color-line);border-radius:var(--radius-card);box-shadow:var(--shadow-1);padding:20px 24px;margin-bottom:20px;">
    <div id="timeline-header" class="timeline"></div>
    <div id="timeline-bars" style="display:flex;flex-direction:column;gap:20px;"></div>
  </div>

  <div style="background:var(--color-surface);border:1.5px solid var(--color-line);border-radius:var(--radius-card);box-shadow:var(--shadow-1);padding:20px 24px;">
    <h2 style="font-family:var(--font-display);font-weight:700;margin:0 0 14px;font-size:var(--text-lg);">Projected Attendees (<span id="attendee-count">26</span>)</h2>
    <div id="attendee-list" style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px 24px;font-size:var(--text-sm);color:var(--color-ink-dim);"></div>
  </div>

</main>

<script>
  function loadData() {
    const days = ['Fri 22','Sat 23','Sun 24','Mon 25','Tue 26','Wed 27','Thu 28','Fri 29'];
    document.getElementById('timeline-header').innerHTML = days.map(d =>
      `<div class="day">${d}</div>`
    ).join('');

    fetch('people.json')
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        const tripStart = data.trip_start;
        const tripEnd   = data.trip_end;
        const tripStartDay = new Date(tripStart).getDate(); // 22
        const totalDays = 8; // May 22 through May 29 inclusive

        // --- Gantt bars ---
        const fullWeek  = data.attendees.filter(p => p.arrival === tripStart && p.departure === tripEnd);
        const lateArr   = data.attendees.filter(p => p.arrival !== tripStart);
        const dep26     = data.attendees.filter(p => p.departure < tripEnd && p.departure === '2026-05-26');
        const dep27     = data.attendees.filter(p => p.departure < tripEnd && p.departure === '2026-05-27');

        function barPct(arrival, departure) {
          const startOff = new Date(arrival).getDate() - tripStartDay;
          const dur      = (new Date(departure) - new Date(arrival)) / 86400000 + 1;
          return {
            width:      (dur      / totalDays) * 100,
            marginLeft: (startOff / totalDays) * 100
          };
        }

        function groupLabel(people) {
          return people.map(p => p.display_name).join(', ');
        }

        const groups = [];

        if (fullWeek.length) {
          const { width, marginLeft } = barPct(tripStart, tripEnd);
          groups.push({
            name:  'Most Attendees',
            label: `Full week • ${groupLabel(fullWeek)}`,
            color: 'var(--status-yes)',
            width, marginLeft
          });
        }

        lateArr.forEach(p => {
          const { width, marginLeft } = barPct(p.arrival, p.departure);
          const arrDate = new Date(p.arrival);
          const dayName = arrDate.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric', timeZone: 'UTC' });
          groups.push({
            name:  p.display_name,
            label: `Arrives ${dayName}`,
            color: 'var(--status-wishlist)',
            width, marginLeft
          });
        });

        dep26.forEach(p => {
          const { width, marginLeft } = barPct(p.arrival, p.departure);
          groups.push({
            name:  p.display_name,
            label: 'Departs Tue 26',
            color: 'var(--accent-sand)',
            width, marginLeft
          });
        });

        dep27.forEach(p => {
          const { width, marginLeft } = barPct(p.arrival, p.departure);
          groups.push({
            name:  p.display_name,
            label: 'Departs Wed 27',
            color: 'var(--accent-dusk)',
            width, marginLeft
          });
        });

        document.getElementById('timeline-bars').innerHTML = groups.map(g => `
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <span style="font-weight:600;color:${g.color}">${g.name}</span>
              <span style="font-size:var(--text-sm);color:${g.color}">${g.label}</span>
            </div>
            <div class="bar-container">
              <div class="bar" style="width:${g.width}%;margin-left:${g.marginLeft}%;background:${g.color}"></div>
            </div>
          </div>
        `).join('');

        // --- Attendee list ---
        document.getElementById('attendee-count').textContent = data.attendees.length;
        document.getElementById('attendee-list').innerHTML = data.attendees.map(p => {
          const arrDay  = new Date(p.arrival).getUTCDate();
          const depDay  = new Date(p.departure).getUTCDate();
          const dateStr = `May ${arrDay}-${depDay}`;
          const href    = 'profile.html?name=' + encodeURIComponent(p.display_name);
          return `<div><a href="${href}" class="attendee-link">${p.display_name} (${p.age})</a><span style="font-size:11px;color:var(--color-ink-dim);margin-left:8px;">${dateStr}</span></div>`;
        }).join('');
      })
      .catch(err => {
        document.getElementById('attendee-list').innerHTML =
          `<p style="color:var(--status-no);grid-column:1/-1;">Could not load people.json (${err.message}). Reload to retry.</p>`;
      });
  }

  window.onload = loadData;
</script>
<script>window.addEventListener('storage',function(e){if(e.key==='vacdash:v1:mode')document.documentElement.setAttribute('data-mode',e.newValue||'system')});</script>
<script>
(function(){
  function syncBadge(){
    var btn = document.getElementById('profile-btn');
    if (!btn) return;
    var u = ''; try { u = localStorage.getItem('vacdash:v1:user') || ''; } catch(e){}
    btn.setAttribute('data-unset', u ? 'false' : 'true');
  }
  syncBadge();
  window.addEventListener('storage', function(e){ if (e.key === 'vacdash:v1:user') syncBadge(); });
})();
</script>
</body>
</html>
