<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branson 2026 - People</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Branson People">
    <link rel="apple-touch-icon" href="https://picsum.photos/id/1015/180/180">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .timeline { display: grid; grid-template-columns: repeat(8, 1fr); gap: 3px; background: #27272a; padding: 3px; border-radius: 12px; }
        .day { text-align: center; font-size: 10px; color: #a1a1aa; padding: 4px 2px; background: #18181b; font-weight: 500; line-height: 1.1; }
        .bar-container { height: 32px; background: #27272a; border-radius: 8px; position: relative; overflow: hidden; margin-bottom: 12px; }
        .bar { height: 100%; border-radius: 6px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 p-4 max-w-2xl mx-auto">
    <div class="bg-zinc-900 border-b border-zinc-700 px-4 py-3 mb-6">
      <div class="max-w-2xl mx-auto flex items-center justify-between">
        <div class="font-bold text-emerald-400 text-xl">Branson 2026</div>
        <div class="flex gap-2 text-sm font-medium">
          <a href="index.html" class="px-5 py-2 rounded-2xl hover:bg-zinc-800 data-[active=true]:bg-emerald-900 data-[active=true]:text-emerald-400">Events</a>
          <a href="people-timeline.html" data-active="true" class="px-5 py-2 rounded-2xl hover:bg-zinc-800 data-[active=true]:bg-emerald-900 data-[active=true]:text-emerald-400">People</a>
          <a href="event-timeline.html" class="px-5 py-2 rounded-2xl hover:bg-zinc-800 data-[active=true]:bg-emerald-900 data-[active=true]:text-emerald-400">Timeline</a>
        </div>
      </div>
    </div>

    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-emerald-400">People &amp; Timeline</h1>
        <p class="text-zinc-400">Arrival and Departure Windows</p>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
        <div id="timeline-header" class="timeline mb-5"></div>
        <div id="timeline-bars" class="space-y-6"></div>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-6">
        <h2 class="font-semibold mb-4 text-zinc-300">Projected Attendees (<span id="attendee-count">26</span>)</h2>
        <div id="attendee-list" class="grid grid-cols-2 gap-x-6 gap-y-1.5 text-sm text-zinc-400"></div>
    </div>

    <p class="text-center text-zinc-500 text-xs mt-12">
        People page • Data from Test Vacation Checklist.md • iMessage is primary
    </p>

    <script>
        function loadData() {
            const days = ['Fri 22', 'Sat 23', 'Sun 24', 'Mon 25', 'Tue 26', 'Wed 27', 'Thu 28', 'Fri 29'];
            document.getElementById('timeline-header').innerHTML = days.map(d => 
                `<div class="day">${d}</div>`
            ).join('');

            const timelineDiv = document.getElementById('timeline-bars');
            const order = ['most_people', 'ashlyn', 'bee', 'kevin', 'evie_ray'];
            const colors = ['#4ade80', '#60a5fa', '#fb923c', '#a78bfa', '#c084fc'];
            const names = ['Most People', 'Ashlyn', 'Bee', 'Kevin', 'Evie & Ray'];
            const labels = ['Full Week (22-29)', 'Arrives Sat 23', 'Departs Tue 26', 'Departs Wed 27 • ATV early', 'Full Week'];
            const starts = [22, 23, 22, 22, 22];
            const ends = [29, 29, 26, 27, 29];

            let html = '';
            order.forEach((key, i) => {
                const startDay = starts[i];
                const endDay = ends[i];
                const widthPct = ((endDay - startDay + 1) / 8) * 100;
                const marginLeft = ((startDay - 22) / 8) * 100;

                html += `
                    <div>
                        <div class="flex justify-between text-sm mb-1.5">
                            <span class="font-medium" style="color: ${colors[i]}">${names[i]}</span>
                            <span class="text-xs" style="color: ${colors[i]}">${labels[i]}</span>
                        </div>
                        <div class="bar-container">
                            <div class="bar" style="width: ${widthPct}%; margin-left: ${marginLeft}%; background: ${colors[i]}"></div>
                        </div>
                    </div>
                `;
            });
            timelineDiv.innerHTML = html;

            const attendees = [
                "Adrian (10)", "Alex (57)", "Ashlyn (28)", "Bee (19)", "Brian (55)", "Bug (9)", "David (18)", 
                "Dez (26)", "Evie (74)", "Georgie (6)", "Jackson (12)", "Jacob (32)", "Jordan (45)", "Josh (45)", 
                "Kevin (29)", "Lucy (16)", "McKinley (16)", "Mel (54)", "Mycah (21)", "Natalie (19)", "Rachel (30)", 
                "Ray (74)", "Simran (24)", "Skylar (29)", "Tayden (21)", "Zach (25)"
            ];
            document.getElementById('attendee-count').textContent = attendees.length;
            document.getElementById('attendee-list').innerHTML = attendees.map(a => 
                `<div>${a}</div>`
            ).join('');
        }

        window.onload = loadData;
    </script>
</body>
</html>
