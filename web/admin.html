<!DOCTYPE html>
<html lang="en" data-mode="system">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Admin — Branson &#x27;26</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/themes/trail.css" id="theme-css">
<link rel="stylesheet" href="css/components.css">
<script>/* Theme loader -- inline to prevent flash-of-wrong-theme */
(function(){
  var m = localStorage.getItem('vacdash:v1:mode') || 'system';
  document.documentElement.setAttribute('data-mode', m);
  var t = localStorage.getItem('vacdash:v1:theme');
  if (t && t !== 'trail') {
    var link = document.getElementById('theme-css');
    if (link) link.setAttribute('href', link.getAttribute('href').replace(/themes\/[^/]+\.css/, 'themes/' + t + '.css'));
  }
})();
</script>
<link rel="preload" href="js/site.js" as="script">
<style>
.attendee-checklist {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px 12px;
  padding: 10px;
  border: 1px solid var(--color-line);
  border-radius: var(--radius-btn);
  background: var(--color-bg);
  margin-bottom: 8px;
}
@media (max-width: 500px) {
  .attendee-checklist { grid-template-columns: 1fr; }
}
.meal-panels {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.meal-panel {
  flex: 1;
  min-width: 200px;
  padding: 10px;
  border: 1px solid var(--color-line);
  border-radius: var(--radius-btn);
  background: var(--color-bg);
}
@media (max-width: 500px) {
  .meal-panels { flex-direction: column; }
}

/* Drum pickers */
.drum-picker-wrap {
  border: 1.5px solid var(--color-line);
  border-radius: var(--radius-btn);
  overflow: hidden;
  background: var(--color-surface);
  position: relative;
}
.drum-picker-wrap::before,
.drum-picker-wrap::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 40px;
  pointer-events: none;
  z-index: 1;
}
.drum-picker-wrap::before {
  top: 0;
  background: linear-gradient(to bottom, var(--color-surface) 0%, transparent 100%);
}
.drum-picker-wrap::after {
  bottom: 0;
  background: linear-gradient(to top, var(--color-surface) 0%, transparent 100%);
}
.drum-picker { display: flex; }
.drum-divider { width: 1px; background: var(--color-line); }
.drum-col {
  flex: 1;
  height: 120px;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  overscroll-behavior: contain;
  padding: 40px 0;
  box-sizing: border-box;
}
.drum-col::-webkit-scrollbar { display: none; }
.drum-item {
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  scroll-snap-align: center;
  cursor: pointer;
  user-select: none;
  color: var(--color-ink);
}
.drum-item.drum-selected {
  background: var(--accent-1);
  color: #fff;
  font-weight: 700;
}

/* Segmented control */
.seg-ctrl {
  display: flex;
  border: 1.5px solid var(--color-line);
  border-radius: var(--radius-btn);
  overflow: hidden;
}
.seg-btn {
  flex: 1;
  padding: 9px 12px;
  background: var(--color-surface);
  border: none;
  border-right: 1px solid var(--color-line);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  color: var(--color-ink);
  transition: background 0.15s, color 0.15s;
}
.seg-btn:last-child { border-right: none; }
.seg-btn.seg-active {
  background: var(--accent-1);
  color: #fff;
}

/* Attendee chips */
.chip {
  padding: 5px 10px;
  border-radius: 9999px;
  border: 1.5px solid var(--color-line);
  background: var(--color-surface);
  color: var(--color-ink);
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  font-family: inherit;
}
.chip.chip-selected {
  background: var(--accent-1);
  color: #fff;
  border-color: var(--accent-1);
}

/* Duration stepper */
.stepper {
  display: inline-flex;
  align-items: center;
  border: 1.5px solid var(--color-line);
  border-radius: var(--radius-btn);
  overflow: hidden;
  background: var(--color-surface);
}
.stepper-btn {
  padding: 9px 16px;
  background: transparent;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: var(--color-ink);
  line-height: 1;
}
.stepper-val {
  padding: 9px 14px;
  font-size: 14px;
  min-width: 3em;
  text-align: center;
  color: var(--color-ink);
  border-left: 1px solid var(--color-line);
  border-right: 1px solid var(--color-line);
}

/* Title validation indicator */
.title-valid-indicator {
  font-size: 16px;
  font-weight: 700;
  min-width: 1.5em;
  text-align: center;
}

/* Meal chip indicators */
.meal-chip-manual { border: 2px solid var(--accent-2) !important; }
.meal-chip-warn   { border: 2px solid var(--status-warn, #e67e22) !important; }

/* Toast snackbar */
#toast-snackbar {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  padding: 10px 20px;
  border-radius: var(--radius-btn);
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  white-space: nowrap;
}
</style>

<body style="margin:0;background:var(--color-bg);color:var(--color-ink);font-family:var(--font-body,sans-serif);">
<script src="js/site.js"></script>

  <!-- Toast snackbar -->

  <!-- Auth gate -->

  <!-- Editor section (hidden until authenticated) -->

      <select id="event-select"

            Reset
          </button>
        </div>
        <div id="orig-title" style="display:none;color:var(--color-ink-dim);font-size:12px;margin-top:4px;"></div>
        <div id="saved-title" style="display:none;color:var(--status-yes);font-size:12px;margin-top:4px;">Saved</div>

      <!-- Date -->
      <div style="margin-bottom:18px;">
        <label style="display:block;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--color-ink-dim);margin-bottom:6px;">Date</label>

            <div class="drum-divider"></div>
            <div class="drum-col" id="drum-day"></div>
            <div class="drum-divider"></div>
            <div class="drum-col" id="drum-year"></div>

        </div>
        <input type="hidden" id="input-date">
        <button id="reset-date" onclick="resetField('date')"

        <div id="orig-date" style="display:none;color:var(--color-ink-dim);font-size:12px;margin-top:4px;"></div>
        <div id="saved-date" style="display:none;color:var(--status-yes);font-size:12px;margin-top:4px;">Saved</div>

        <input type="hidden" id="input-startTime">

            <button type="button" id="meal-move-left-btn" style="padding:6px 10px;border-radius:var(--radius-btn);background:var(--color-surface);border:1px solid var(--color-line);font-size:12px;cursor:pointer;color:var(--color-ink);white-space:nowrap;">← Eating</button>

            <div style="font-weight:700;font-size:13px;color:var(--color-ink-dim);margin-bottom:6px;">Not Eating</div>

      </div>

      <!-- Error banner -->
      <div id="error-banner"
        style="display:none;background:#F8DDD5;color:#6A1F17;border:1px solid #C1553B;padding:12px 16px;font-size:14px;border-radius:4px;margin-bottom:14px;">
      </div>

      <!-- Save + Reset All buttons -->
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px;">
        <button id="save-btn" onclick="saveOverrides()" disabled
          style="padding:10px 20px;border-radius:var(--radius-btn);background:var(--color-surface);border:1.5px solid var(--color-line);font-family:var(--font-display);font-weight:700;font-size:14px;cursor:not-allowed;opacity:0.6;color:var(--color-ink);">
          Save Changes
        </button>
        <button id="reset-all-btn" onclick="resetAllOverrides()"
          style="padding:10px 20px;border-radius:var(--radius-btn);background:var(--color-surface);border:1px solid var(--color-line);font-size:13px;cursor:pointer;color:var(--color-ink-dim);">
          Reset All Overrides for This Event
        </button>
      </div>

    </div><!-- /event-form -->
  </section><!-- /editor-section -->

  <script>
    const SUPABASE_URL = 'https://quebfbvfuwbncpexlylu.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_yLlf7qoMZMfiZhNsyudX7g_HnZ8clgt';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function getAdminToken() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      return session ? session.access_token : SUPABASE_ANON_KEY;
    }

    function showEditor() {
      document.getElementById('passcode-section').style.display = 'none';
      document.getElementById('editor-section').style.display = 'block';
    }

    function showAuthUI() {
      document.getElementById('auth-email-login').style.display = 'block';
    }

    const FIELDS = ['title', 'date', 'startTime', 'duration'];

    let allEvents = [];
    let currentEvent = null;
    let currentOverrides = {};
    let loadedValues = {};
    let currentSort = 'date';
    let allAttendees = [];
    let mealAutoExcluded = new Set();
    let mealConflictByName = {};
    let mealSameDateEvents = [];

    // --- Toast snackbar (Pattern 8) ---
    let toastTimeout = null;
    function showToast(message, type) {
      const el = document.getElementById('toast-snackbar');
      el.textContent = message;
      el.style.background = type === 'success' ? '#2e7d32' : '#c62828';
      el.style.opacity = '1';
      if (toastTimeout) clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => { el.style.opacity = '0'; }, 2500);
    }

    // --- Drum picker (Patterns 3 & 4) ---
    const DRUM_ITEM_H = 40;
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const YEARS = [2025, 2026, 2027];
    const MINUTES = [':00', ':15', ':30', ':45'];
    const AMPM = ['AM', 'PM'];

    function buildDrumCol(colEl, items, selectedIndex) {
      colEl.innerHTML = '';
      items.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'drum-item' + (i === selectedIndex ? ' drum-selected' : '');
        div.textContent = String(item);
        colEl.appendChild(div);
      });
      colEl.dataset.drumIdx = selectedIndex;
      colEl.scrollTop = selectedIndex * DRUM_ITEM_H;
      setupDrumScroll(colEl);
    }

    function getDrumSelectedIndex(colEl) {
      if (colEl.dataset.drumIdx !== undefined) return parseInt(colEl.dataset.drumIdx, 10);
      return Math.round(colEl.scrollTop / DRUM_ITEM_H);
    }

    function setupDrumScroll(colEl) {
      let scrollTimer = null;
      colEl.addEventListener('scroll', () => {
        if (scrollTimer) clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => {
          const idx = Math.round(colEl.scrollTop / DRUM_ITEM_H);
          colEl.dataset.drumIdx = idx;
          colEl.querySelectorAll('.drum-item').forEach((el, i) => {
            el.classList.toggle('drum-selected', i === idx);
          });
          syncDateHiddenInput();
          syncTimeHiddenInput();
          updateSaveBtnDirty();
        }, 80);
      }, { passive: true });
      colEl.addEventListener('click', e => {
        const item = e.target.closest('.drum-item');
        if (!item) return;
        const idx = Array.from(colEl.querySelectorAll('.drum-item')).indexOf(item);
        if (idx >= 0) {
          colEl.dataset.drumIdx = idx;
          colEl.scrollTop = idx * DRUM_ITEM_H;
          colEl.querySelectorAll('.drum-item').forEach((el, i) => {
            el.classList.toggle('drum-selected', i === idx);
          });
          syncDateHiddenInput();
          syncTimeHiddenInput();
          updateSaveBtnDirty();
        }
      });
    }

    function syncDateHiddenInput() {
      const mc = document.getElementById('drum-month');
      const dc = document.getElementById('drum-day');
      const yc = document.getElementById('drum-year');
      if (!mc || !dc || !yc) return;
      const monthIdx = getDrumSelectedIndex(mc);
      const dayNum   = getDrumSelectedIndex(dc) + 1;
      const year     = YEARS[getDrumSelectedIndex(yc)] || 2026;
      const month    = String(monthIdx + 1).padStart(2, '0');
      const day      = String(dayNum).padStart(2, '0');
      document.getElementById('input-date').value = `${year}-${month}-${day}`;
      const previewEl = document.getElementById('date-preview-label');
      if (previewEl) {
        const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const dow = DOW[new Date(year, monthIdx, dayNum).getDay()];
        previewEl.textContent = `DATE ${dow}, ${MONTHS[monthIdx]} ${dayNum}, ${year}`;
      }
    }

    function syncTimeHiddenInput() {
      const hc = document.getElementById('drum-hour');
      const mc = document.getElementById('drum-minute');
      const ac = document.getElementById('drum-ampm');
      if (!hc || !mc || !ac) return;
      const hour   = getDrumSelectedIndex(hc) + 1;
      const minStr = MINUTES[getDrumSelectedIndex(mc)].slice(1);
      const ampm   = AMPM[getDrumSelectedIndex(ac)] || 'AM';
      document.getElementById('input-startTime').value = `${hour}:${minStr} ${ampm}`;
      const previewEl = document.getElementById('time-preview-label');
      if (previewEl) {
        previewEl.textContent = `TIME ${hour}:${minStr} ${ampm}`;
      }
    }

    function initDateDrum() {
      const days = Array.from({length: 31}, (_, i) => i + 1);
      buildDrumCol(document.getElementById('drum-month'), MONTHS, 0);
      buildDrumCol(document.getElementById('drum-day'), days, 0);
      buildDrumCol(document.getElementById('drum-year'), YEARS, 1);
      syncDateHiddenInput();
    }

    function initTimeDrum() {
      const hours = Array.from({length: 12}, (_, i) => i + 1);
      buildDrumCol(document.getElementById('drum-hour'), hours, 8);
      buildDrumCol(document.getElementById('drum-minute'), MINUTES, 0);
      buildDrumCol(document.getElementById('drum-ampm'), AMPM, 0);
      syncTimeHiddenInput();
    }

    function snapDateDrumToValue(dateStr) {
      if (!dateStr || dateStr.length < 10) return;
      const parts = dateStr.split('-');
      const year  = parseInt(parts[0], 10);
      const month = parseInt(parts[1], 10);
      const day   = parseInt(parts[2], 10);
      const yi = YEARS.indexOf(year);
      const mc = document.getElementById('drum-month');
      const dc = document.getElementById('drum-day');
      const yc = document.getElementById('drum-year');
      if (!mc) return;
      mc.dataset.drumIdx = month - 1;
      dc.dataset.drumIdx = Math.min(day - 1, 30);
      yc.dataset.drumIdx = (yi >= 0 ? yi : 1);
      mc.scrollTop = (month - 1) * DRUM_ITEM_H;
      dc.scrollTop = Math.min(day - 1, 30) * DRUM_ITEM_H;
      yc.scrollTop = (yi >= 0 ? yi : 1) * DRUM_ITEM_H;
      [mc, dc, yc].forEach(col => {
        const idx = getDrumSelectedIndex(col);
        col.querySelectorAll('.drum-item').forEach((el, i) => el.classList.toggle('drum-selected', i === idx));
      });
      syncDateHiddenInput();
    }

    function snapTimeDrumToValue(timeStr) {
      if (!timeStr) return;
      const m = timeStr.match(/^(\d+):(\d+)\s*(AM|PM)$/i);
      if (!m) return;
      const hour   = parseInt(m[1], 10);
      const minute = parseInt(m[2], 10);
      const ampm   = m[3].toUpperCase();
      const minIdx  = MINUTES.indexOf(':' + String(minute).padStart(2, '0'));
      const ampmIdx = AMPM.indexOf(ampm);
      const hc = document.getElementById('drum-hour');
      const mc = document.getElementById('drum-minute');
      const ac = document.getElementById('drum-ampm');
      if (!hc) return;
      hc.dataset.drumIdx = Math.max(0, hour - 1);
      mc.dataset.drumIdx = (minIdx >= 0 ? minIdx : 0);
      ac.dataset.drumIdx = (ampmIdx >= 0 ? ampmIdx : 0);
      hc.scrollTop = Math.max(0, hour - 1) * DRUM_ITEM_H;
      mc.scrollTop = (minIdx >= 0 ? minIdx : 0) * DRUM_ITEM_H;
      ac.scrollTop = (ampmIdx >= 0 ? ampmIdx : 0) * DRUM_ITEM_H;
      [hc, mc, ac].forEach(col => {
        const idx = getDrumSelectedIndex(col);
        col.querySelectorAll('.drum-item').forEach((el, i) => el.classList.toggle('drum-selected', i === idx));
      });
      syncTimeHiddenInput();
    }

    // --- Duration stepper (Pattern 5) ---
    const DUR_MIN = 0.5, DUR_MAX = 12, DUR_STEP = 0.5;

    function updateDurationDisplay(val) {
      const n = parseFloat(val);
      const display = document.getElementById('dur-display');
      if (isNaN(n)) {
        display.textContent = '—';
      } else {
        const formatted = n % 1 === 0 ? String(n) : n.toFixed(1);
        display.textContent = formatted;
        document.getElementById('input-duration').value = formatted;
      }
    }

    function stepDuration(delta) {
      const hidden = document.getElementById('input-duration');
      let val = parseFloat(hidden.value);
      if (isNaN(val)) val = 1;
      const rounded = Math.round(Math.min(DUR_MAX, Math.max(DUR_MIN, val + delta)) / DUR_STEP) * DUR_STEP;
      hidden.value = rounded % 1 === 0 ? String(rounded) : rounded.toFixed(1);
      document.getElementById('dur-display').textContent = hidden.value;
    }

    // --- Segmented control (Pattern 6) ---
    function syncSegmentedControl(value) {
      document.querySelectorAll('#event-type-segmented .seg-btn').forEach(btn => {
        btn.classList.toggle('seg-active', btn.dataset.value === value);
      });
    }

    // --- Title validation (Pattern 2) ---
    function updateTitleValidation(value) {
      const indicator = document.getElementById('title-validation-indicator');
      if (!indicator) return;
      if (value && value.trim() !== '') {
        indicator.textContent = '✓';
        indicator.style.color = 'var(--status-yes)';
      } else {
        indicator.textContent = '✗';
        indicator.style.color = 'var(--status-no)';
      }
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length !== 3) return dateStr;
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[parseInt(parts[1], 10) - 1] + ' ' + parseInt(parts[2], 10);
    }

    function getSortedEvents() {
      const sorted = [...allEvents];
      if (currentSort === 'date') {
        sorted.sort((a, b) => a.date.localeCompare(b.date) || a.title.localeCompare(b.title));
      } else if (currentSort === 'title') {
        sorted.sort((a, b) => a.title.localeCompare(b.title));
      } else if (currentSort === 'duration') {
        sorted.sort((a, b) => b.duration - a.duration);
      } else if (currentSort === 'interest') {
        sorted.sort((a, b) => b.interested.length - a.interested.length);
      }
      return sorted;
    }

    // Pattern 1: sort-aware option labels
    function renderEventSelect() {
      const sel = document.getElementById('event-select');
      const prevVal = sel.value;
      const sorted = getSortedEvents();
      sel.innerHTML = '<option value="">— select an event —</option>' +
        sorted.map(e => {
          const label = currentSort === 'date'
            ? `${formatDate(e.date)} — ${e.title}`
            : `${e.title} (${formatDate(e.date)})`;
          return `<option value="${e.id}">${label}</option>`;
        }).join('');
      if (prevVal && sorted.find(e => e.id === prevVal)) sel.value = prevVal;
    }

    function populateField(field, scheduleValue) {
      const input   = document.getElementById('input-' + field);
      const origDiv = document.getElementById('orig-' + field);
      const resetBtn = document.getElementById('reset-' + field);
      if (currentOverrides.hasOwnProperty(field)) {
        input.value = currentOverrides[field];
        origDiv.textContent = '(originally ' + (scheduleValue !== '' ? scheduleValue : '(empty)') + ')';
        origDiv.style.display = 'block';
        resetBtn.style.display = 'inline-block';
      } else {
        input.value = scheduleValue;
        origDiv.style.display = 'none';
        resetBtn.style.display = 'none';
      }
      if (field === 'date')      snapDateDrumToValue(input.value);
      if (field === 'startTime') snapTimeDrumToValue(input.value);
      if (field === 'duration')  updateDurationDisplay(input.value);
      if (field === 'title')     updateTitleValidation(input.value);
    }

    // --- Coordinator helpers ---

    async function patchScheduleEvent(eventId, fields) {
      const token = await getAdminToken();
      return fetch(
        `${SUPABASE_URL}/rest/v1/schedule_events?id=eq.${eventId}`,
        {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${token}`,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(fields)
        }
      );
    }

    function updateEventTypeSections() {
      const val = document.getElementById('event-type-select').value;
      document.getElementById('attendee-section').style.display = val === 'commitment' ? 'block' : 'none';
      document.getElementById('meal-section').style.display = val === 'meal' ? 'block' : 'none';
    }

    function updateAttendeeBadge(n) {
      document.getElementById('attendee-count-badge').textContent = `${n} of ${allAttendees.length} assigned`;
    }

    function timeToMinutes(timeStr) {
      if (!timeStr) return 0;
      let m = timeStr.match(/^(\d{1,2}):(\d{2})$/);
      if (m) return parseInt(m[1], 10) * 60 + parseInt(m[2], 10);
      m = timeStr.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      if (!m) return 0;
      let h = parseInt(m[1], 10);
      const min = parseInt(m[2], 10);
      const ampm = m[3].toUpperCase();
      if (ampm === 'PM' && h !== 12) h += 12;
      if (ampm === 'AM' && h === 12) h = 0;
      return h * 60 + min;
    }

    function eventsOverlap(a, b) {
      const aStart = timeToMinutes(a.startTime);
      const aEnd   = aStart + parseFloat(a.duration || 0) * 60;
      const bStart = timeToMinutes(b.startTime);
      const bEnd   = bStart + parseFloat(b.duration || 0) * 60;
      return aStart < bEnd && bStart < aEnd;
    }

    function updateMealHeadcount() {
      const count = document.querySelectorAll('#meal-left-panel .chip').length;
      document.getElementById('meal-final-count').textContent = `Headcount: ${count}`;
    }

    function populateMealPanels(event, sameDateEvents) {
      mealAutoExcluded = new Set();
      mealConflictByName = {};
      (sameDateEvents || []).forEach(e => {
        if (e.event_type !== 'commitment') return;
        if (!eventsOverlap(event, e)) return;
        (e.assigned_attendees || []).forEach(name => {
          mealAutoExcluded.add(name);
          if (!mealConflictByName[name]) mealConflictByName[name] = e.title;
        });
      });

      const mealOverrideInclude = event.meal_override_include || [];
      const mealOverrideExclude = event.meal_override_exclude || [];

      const leftEntries  = [];
      const rightEntries = [];
      allAttendees.forEach(name => {
        if (mealAutoExcluded.has(name)) rightEntries.push({ name, isManual: false });
        else                            leftEntries.push({ name, isManual: false });
      });

      mealOverrideInclude.forEach(name => {
        const idx = leftEntries.findIndex(p => p.name === name);
        if (idx >= 0) {
          const p = leftEntries.splice(idx, 1)[0];
          p.isManual = true;
          rightEntries.push(p);
        } else {
          const rp = rightEntries.find(p => p.name === name);
          if (rp) rp.isManual = true;
        }
      });
      mealOverrideExclude.forEach(name => {
        const idx = rightEntries.findIndex(p => p.name === name);
        if (idx >= 0) {
          const p = rightEntries.splice(idx, 1)[0];
          p.isManual = true;
          leftEntries.push(p);
        } else {
          const lp = leftEntries.find(p => p.name === name);
          if (lp) lp.isManual = true;
        }
      });

      const leftEl  = document.getElementById('meal-left-panel');
      const rightEl = document.getElementById('meal-right-panel');
      leftEl.innerHTML = '';
      rightEl.innerHTML = '';

      function makeChip(person) {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'chip';
        chip.dataset.name = person.name;
        chip.textContent = person.name;

        const isForceExcluded = mealOverrideInclude.includes(person.name);
        const isForceIncluded = mealOverrideExclude.includes(person.name);

        let alertMsg = null;
        if (isForceExcluded && !mealAutoExcluded.has(person.name)) {
          alertMsg = 'Manually excluded, but no longer has a time conflict';
        } else if (isForceIncluded && mealAutoExcluded.has(person.name)) {
          alertMsg = `Manually included, but now conflicts with: ${mealConflictByName[person.name] || 'unknown event'}`;
        }

        if (alertMsg) {
          chip.classList.add('meal-chip-warn');
          chip.title = alertMsg;
        } else if (person.isManual) {
          chip.classList.add('meal-chip-manual');
        }

        chip.addEventListener('click', () => chip.classList.toggle('chip-selected'));
        return chip;
      }

      leftEntries.forEach(p  => leftEl.appendChild(makeChip(p)));
      rightEntries.forEach(p => rightEl.appendChild(makeChip(p)));
      updateMealHeadcount();
    }

    function moveMealChips(fromId, toId) {
      const fromPanel = document.getElementById(fromId);
      const toPanel   = document.getElementById(toId);
      Array.from(fromPanel.querySelectorAll('.chip-selected')).forEach(chip => {
        chip.classList.remove('chip-selected');
        toPanel.appendChild(chip);
      });
      updateSaveBtnDirty();
      updateMealHeadcount();
    }

    // Pattern 7: chip-based attendee list
    function buildAttendeeCheckboxes() {
      const container = document.getElementById('attendee-checklist');
      container.innerHTML = '';
      allAttendees.forEach(name => {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'chip';
        chip.dataset.name = name;
        chip.textContent = name;
        chip.addEventListener('click', () => {
          chip.classList.toggle('chip-selected');
          updateAttendeeBadge(container.querySelectorAll('.chip-selected').length);
        });
        container.appendChild(chip);
      });
      container.style.gridAutoFlow = 'column';
      container.style.gridTemplateRows = 'repeat(' + Math.ceil(allAttendees.length / 3) + ', auto)';
    }


// Pattern 7: read chips instead of checkboxes
    async function saveAttendees() {
      if (!currentEvent) return;
      const checked = [...document.querySelectorAll('#attendee-checklist .chip-selected')]
        .map(chip => chip.dataset.name);
      const savedEl = document.getElementById('attendee-saved');
      try {
        const r = await patchScheduleEvent(currentEvent.id, { assigned_attendees: checked });
        if (!r.ok) {
          const text = await r.text();
          savedEl.textContent = 'Error: ' + r.status + ' ' + text;
          savedEl.style.color = 'var(--status-no)';
          savedEl.style.display = 'inline';
          return;
        }
        currentEvent.assigned_attendees = checked;
        const evInList = allEvents.find(e => e.id === currentEvent.id);
        if (evInList) evInList.assigned_attendees = checked;
        updateAttendeeBadge(checked.length);
        savedEl.textContent = 'Saved';
        savedEl.style.color = 'var(--status-yes)';
        savedEl.style.display = 'inline';
        setTimeout(() => { savedEl.style.display = 'none'; }, 2000);
      } catch (e) {
        savedEl.textContent = 'Error: ' + e.message;
        savedEl.style.color = 'var(--status-no)';
        savedEl.style.display = 'inline';
      }
    }

    // --- Dirty-state for Save Changes button ---
    function updateSaveBtnDirty() {
      const btn = document.getElementById('save-btn');
      if (!btn || !currentEvent) return;
      if (loadedValues.title === undefined) return; // not yet loaded

      let dirty = false;
      for (const f of FIELDS) {
        const input = document.getElementById('input-' + f);
        if (input && input.value !== loadedValues[f]) { dirty = true; break; }
      }
      if (!dirty) {
        const slugVal = document.getElementById('series-slug-input').value;
        if (slugVal !== (loadedValues.series_slug || '')) dirty = true;
      }
      if (!dirty) {
        const etVal = document.getElementById('event-type-select').value;
        if (etVal !== (loadedValues.event_type || '')) dirty = true;
      }
      if (!dirty && loadedValues.meal_override_include !== undefined) {
        const rightNames = [...document.querySelectorAll('#meal-right-panel .chip')].map(c => c.dataset.name);
        const leftNames  = [...document.querySelectorAll('#meal-left-panel .chip')].map(c => c.dataset.name);
        const curInc = JSON.stringify(rightNames.filter(n => !mealAutoExcluded.has(n)));
        const curExc = JSON.stringify(leftNames.filter(n =>  mealAutoExcluded.has(n)));
        if (curInc !== loadedValues.meal_override_include) dirty = true;
        if (curExc !== loadedValues.meal_override_exclude) dirty = true;
      }

      if (dirty) {
        btn.disabled          = false;
        btn.style.background  = 'var(--accent-1)';
        btn.style.borderColor = 'var(--accent-1)';
        btn.style.color       = '#fff';
        btn.style.opacity     = '1';
        btn.style.cursor      = 'pointer';
      } else {
        btn.disabled          = true;
        btn.style.background  = 'var(--color-surface)';
        btn.style.borderColor = 'var(--color-line)';
        btn.style.color       = 'var(--color-ink)';
        btn.style.opacity     = '0.45';
        btn.style.cursor      = 'not-allowed';
      }
    }

    // --- End coordinator helpers ---

    async function loadEventForm() {
      if (!currentEvent) return;
      currentOverrides = {};
      document.getElementById('error-banner').style.display = 'none';

      try {
        const r = await fetch(
          `${SUPABASE_URL}/rest/v1/schedule_overrides?event_id=eq.${currentEvent.id}&select=field,new_value`,
          { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
        );
        if (r.ok) {
          const rows = await r.json();
          rows.forEach(row => { currentOverrides[row.field] = row.new_value; });
        }
      } catch (e) {
        console.error('[admin] fetch overrides failed', e);
      }

      // Show form first so drum scrollTop assignments take effect
      document.getElementById('event-form').style.display = 'block';
      FIELDS.forEach(f => { document.getElementById('saved-' + f).style.display = 'none'; });

      // Clear loadedValues so dirty-state checks during populate are no-ops
      loadedValues = {};

      populateField('title',     currentEvent.title     != null ? String(currentEvent.title)     : '');
      populateField('date',      currentEvent.date      != null ? String(currentEvent.date)      : '');
      populateField('startTime', currentEvent.startTime != null ? String(currentEvent.startTime) : '');
      populateField('duration',  currentEvent.duration  != null ? String(currentEvent.duration)  : '');

      // Fetch coordinator fields and same-date events in parallel
      try {
        const [er, sr] = await Promise.all([
          fetch(
            `${SUPABASE_URL}/rest/v1/schedule_events?id=eq.${currentEvent.id}&select=event_type,series_slug,assigned_attendees,meal_override_include,meal_override_exclude`,
            { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
          ),
          fetch(
            `${SUPABASE_URL}/rest/v1/schedule_events?date=eq.${currentEvent.date}&id=neq.${currentEvent.id}&select=id,title,startTime,duration,event_type,assigned_attendees`,
            { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
          )
        ]);

        mealSameDateEvents = sr.ok ? await sr.json() : [];

        if (er.ok) {
          const rows = await er.json();
          if (rows.length > 0) {
            const ev = rows[0];
            currentEvent.event_type            = ev.event_type;
            currentEvent.assigned_attendees    = ev.assigned_attendees || [];
            currentEvent.meal_override_include = ev.meal_override_include || [];
            currentEvent.meal_override_exclude = ev.meal_override_exclude || [];
            const evInList = allEvents.find(e => e.id === currentEvent.id);
            if (evInList) {
              evInList.event_type         = ev.event_type;
              evInList.assigned_attendees = ev.assigned_attendees || [];
            }
            const evType = (ev.event_type && ev.event_type !== '') ? ev.event_type : 'commitment';
            document.getElementById('event-type-select').value = evType;
            syncSegmentedControl(evType);
            document.getElementById('series-slug-input').value = ev.series_slug || '';
            updateEventTypeSections();
            const assigned = ev.assigned_attendees || [];
            document.querySelectorAll('#attendee-checklist .chip').forEach(chip => {
              chip.classList.toggle('chip-selected', assigned.includes(chip.dataset.name));
            });
            updateAttendeeBadge(assigned.length);
            populateMealPanels(currentEvent, mealSameDateEvents);
          }
        }
      } catch (e) {
        console.error('[admin] fetch coordinator fields failed', e);
      }

      // Snapshot loaded values AFTER all populate completes; then evaluate dirty (clean).
      const newLoaded = {};
      FIELDS.forEach(f => { newLoaded[f] = document.getElementById('input-' + f).value; });
      newLoaded.series_slug = document.getElementById('series-slug-input').value;
      newLoaded.event_type  = document.getElementById('event-type-select').value;
      const rNames = [...document.querySelectorAll('#meal-right-panel .chip')].map(c => c.dataset.name);
      const lNames = [...document.querySelectorAll('#meal-left-panel .chip')].map(c => c.dataset.name);
      newLoaded.meal_override_include = JSON.stringify(rNames.filter(n => !mealAutoExcluded.has(n)));
      newLoaded.meal_override_exclude = JSON.stringify(lNames.filter(n =>  mealAutoExcluded.has(n)));
      loadedValues = newLoaded;
      updateSaveBtnDirty();
    }

    async function resetField(field) {
      if (!currentEvent) return;
      try {
        const r = await fetch(
          `${SUPABASE_URL}/rest/v1/schedule_overrides?event_id=eq.${currentEvent.id}&field=eq.${field}`,
          { method: 'DELETE', headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${await getAdminToken()}` } }
        );
        if (!r.ok) { const text = await r.text(); showErrorBanner('Reset failed: ' + r.status + ' ' + text); return; }
        await loadEventForm();
      } catch (e) {
        showErrorBanner('Reset failed: ' + e.message);
      }
    }

    async function resetAllOverrides() {
      if (!currentEvent) return;
      try {
        const r = await fetch(
          `${SUPABASE_URL}/rest/v1/schedule_overrides?event_id=eq.${currentEvent.id}`,
          { method: 'DELETE', headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${await getAdminToken()}` } }
        );
        if (!r.ok) { const text = await r.text(); showErrorBanner('Reset all failed: ' + r.status + ' ' + text); return; }
        await loadEventForm();
      } catch (e) {
        showErrorBanner('Reset all failed: ' + e.message);
      }
    }

    // Pattern 8: replace per-field saved indicators with showToast
    async function saveOverrides() {
      if (!currentEvent) return;
      if (document.getElementById('attendee-section').style.display !== 'none') {
        await saveAttendees();
      }
      document.getElementById('error-banner').style.display = 'none';

      const rows = [];
      FIELDS.forEach(f => {
        const input = document.getElementById('input-' + f);
        if (input.value !== loadedValues[f]) {
          rows.push({ event_id: currentEvent.id, field: f, new_value: input.value, updated_by: 'Alex' });
        }
      });

      // Coordinator-field PATCH: event_type + series_slug + meal overrides
      const patch = {};
      const etCur = document.getElementById('event-type-select').value;
      if (etCur !== (loadedValues.event_type || '')) {
        patch.event_type = etCur || null;
      }
      const slugCur = document.getElementById('series-slug-input').value.trim();
      const slugLoaded = (loadedValues.series_slug || '').trim();
      if (slugCur !== slugLoaded) {
        patch.series_slug = slugCur || null;
      }
      if (loadedValues.meal_override_include !== undefined) {
        const rightNames = [...document.querySelectorAll('#meal-right-panel .chip')].map(c => c.dataset.name);
        const leftNames  = [...document.querySelectorAll('#meal-left-panel .chip')].map(c => c.dataset.name);
        const incCur = JSON.stringify(rightNames.filter(n => !mealAutoExcluded.has(n)));
        const excCur = JSON.stringify(leftNames.filter(n =>  mealAutoExcluded.has(n)));
        if (incCur !== loadedValues.meal_override_include) {
          patch.meal_override_include = JSON.parse(incCur);
        }
        if (excCur !== loadedValues.meal_override_exclude) {
          patch.meal_override_exclude = JSON.parse(excCur);
        }
      }

      if (rows.length === 0 && Object.keys(patch).length === 0) return;

      try {
        if (Object.keys(patch).length > 0) {
          const pr = await patchScheduleEvent(currentEvent.id, patch);
          if (!pr.ok) {
            const text = await pr.text();
            showErrorBanner('Save failed: ' + pr.status + ' ' + text);
            return;
          }
        }
        if (rows.length > 0) {
          const r = await fetch(
            `${SUPABASE_URL}/rest/v1/schedule_overrides?on_conflict=event_id,field`,
            {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${await getAdminToken()}`,
                'Prefer': 'return=minimal,resolution=merge-duplicates'
              },
              body: JSON.stringify(rows)
            }
          );
          if (!r.ok) {
            const text = await r.text();
            showErrorBanner('Save failed: ' + r.status + ' ' + text);
            return;
          }
        }
        await loadEventForm();
        showToast('Saved', 'success');
      } catch (e) {
        showErrorBanner('Save failed: ' + e.message);
      }
    }

    function showErrorBanner(msg) {
      const el = document.getElementById('error-banner');
      el.textContent = msg;
      el.style.display = 'block';
    }

    async function checkSupabase() {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 3000);
        await fetch(
          `${SUPABASE_URL}/rest/v1/schedule_overrides?select=event_id&limit=1`,
          { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }, signal: controller.signal }
        );
        clearTimeout(timeoutId);
      } catch (e) {
        document.getElementById('offline-banner').style.display = 'block';
      }
    }

    window.addEventListener('DOMContentLoaded', async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) { showEditor(); } else { showAuthUI(); }

      document.getElementById('login-btn').addEventListener('click', async () => {
        const errEl = document.getElementById('auth-error-email');
        errEl.style.display = 'none';
        const email    = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        try {
          const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
          if (error) throw error;
          showEditor();
        } catch (e) {
          errEl.textContent = e.message || 'Sign-in failed.';
          errEl.style.display = 'block';
        }
      });

      // Pattern 9: import status uses opacity; no margin-top override
      if (localStorage.getItem('branson_import_done')) {
        document.getElementById('import-btn').textContent = 'Re-import';
      }
      document.getElementById('import-btn').addEventListener('click', async () => {
        const statusEl  = document.getElementById('import-status');
        const importBtn = document.getElementById('import-btn');
        statusEl.style.opacity = '1';
        statusEl.style.color   = 'var(--color-ink)';
        statusEl.textContent   = 'Importing\u2026';
        try {
          const r = await fetch('schedule.json');
          const scheduleData = await r.json();
          const events = scheduleData.events;
          const actualCount   = events.length;
          const expectedCount = 28;
          const mappedRows = events.map(e => ({
            id: e.id, title: e.title, date: e.date, duration: e.duration,
            priority: e.priority, catalogRef: e.catalogRef, startTime: e.startTime,
            travelMinutes: e.travelMinutes, interested: e.interested,
            undecided: e.undecided, notInterested: e.notInterested, noResponse: e.noResponse
          }));
          const { error } = await supabaseClient.from('schedule_events').upsert(mappedRows, { onConflict: 'id' });
          if (error) throw error;
          localStorage.setItem('branson_import_done', '1');
          importBtn.textContent = 'Re-import';
          if (actualCount === expectedCount) {
            statusEl.style.color = '#27ae60';
            statusEl.textContent = `${actualCount} events imported`;
          } else {
            statusEl.style.color = '#856404';
            statusEl.textContent = `Warning: expected ${expectedCount} events, got ${actualCount}`;
          }
        } catch (e) {
          statusEl.style.color = '#c0392b';
          statusEl.textContent = e.message || String(e);
        }
      });

      checkSupabase();

      try {
        const r = await fetch('schedule.json');
        const data = await r.json();
        allEvents = data.events;
        renderEventSelect();
      } catch (e) {
        console.error('[admin] Failed to load schedule.json:', e);
      }

      const FALLBACK_ATTENDEES = [
        'Adrian','Alex','Ashlyn','Bee','Brian','Buggy','David','Dez','Evie','Georgie',
        'Jackson','Jacob','Jordan','Josh','Kevin','Lucy','McKinley','Mel','Mycah',
        'Natalie','Rachel','Ray','Simran','Skylar','Tayden','Zach'
      ];
      try {
        const pr = await fetch('../data/people.json');
        if (!pr.ok) throw new Error('HTTP ' + pr.status);
        const pdata = await pr.json();
        allAttendees = pdata.attendees.map(a => a.display_name);
      } catch (e) {
        console.warn('[admin] people.json fetch failed, using fallback list', e);
        allAttendees = FALLBACK_ATTENDEES;
      }
      buildAttendeeCheckboxes();

      initDateDrum();
      initTimeDrum();

      // Pattern 2: title validation listener (also dirty-state)
      document.getElementById('input-title').addEventListener('input', e => {
        updateTitleValidation(e.target.value);
        updateSaveBtnDirty();
      });

      // Series slug: strip invalid characters; also dirty-state
      document.getElementById('series-slug-input').addEventListener('input', e => {
        const stripped = e.target.value.replace(/[^a-z-]/g, '');
        if (stripped !== e.target.value) e.target.value = stripped;
        updateSaveBtnDirty();
      });

      // Pattern 5: stepper buttons
      document.getElementById('dur-minus').addEventListener('click', () => { stepDuration(-DUR_STEP); updateSaveBtnDirty(); });
      document.getElementById('dur-plus').addEventListener('click',  () => { stepDuration(DUR_STEP);  updateSaveBtnDirty(); });

      // Meal chip move buttons
      document.getElementById('meal-move-right-btn').addEventListener('click', () => moveMealChips('meal-left-panel',  'meal-right-panel'));
      document.getElementById('meal-move-left-btn').addEventListener('click',  () => moveMealChips('meal-right-panel', 'meal-left-panel'));

      // Pattern 6: segmented control → hidden select → change event
      document.querySelectorAll('#event-type-segmented .seg-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const val = btn.dataset.value;
          document.getElementById('event-type-select').value = val;
          syncSegmentedControl(val);
          document.getElementById('event-type-select').dispatchEvent(new Event('change'));
        });
      });

      // Event type change: update sections + dirty state; save via Save Changes button
      document.getElementById('event-type-select').addEventListener('change', () => {
        if (!currentEvent) return;
        const val = document.getElementById('event-type-select').value;
        updateEventTypeSections();
        if (val === 'meal') {
          populateMealPanels(currentEvent, mealSameDateEvents);
        }
        updateSaveBtnDirty();
      });

      document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentSort = btn.dataset.sort;
          document.querySelectorAll('.sort-btn').forEach(b => {
            b.style.fontWeight = b === btn ? 'bold'   : 'normal';
            b.style.border     = b === btn ? '2px solid var(--color-ink)' : '1px solid var(--color-line)';
          });
          renderEventSelect();
        });
      });

      document.getElementById('event-select').addEventListener('change', async () => {
        const eventId = document.getElementById('event-select').value;
        if (!eventId) {
          document.getElementById('event-form').style.display = 'none';
          currentEvent = null;
          return;
        }
        currentEvent = allEvents.find(e => e.id === eventId) || null;
        if (currentEvent) await loadEventForm();
      });
    });
  </script>

</body>
</html>
