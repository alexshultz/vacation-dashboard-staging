    <link rel="apple-touch-icon" href="https://picsum.photos/id/1015/180/180">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .event-card { transition: all 0.2s; }
        details.event-card { border: 1px solid rgb(63 63 70); border-radius: 1.5rem; margin-bottom: 1rem; overflow: hidden; }
        summary { list-style: none; padding: 1.25rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        summary::-webkit-details-marker { display: none; }
        .name-list { display: flex; flex-direction: column; gap: 2px; line-height: 1.35; font-size: 0.875rem; padding: 0 1.25rem 1.25rem; }
        .group { margin-bottom: 16px; }
        .group-title { font-size: 0.75rem; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .duration-bar-container { height: 6px; background: #27272a; border-radius: 9999px; margin: 8px 0; position: relative; }
        .duration-bar { height: 100%; background: linear-gradient(to right, #10b981, #34d399); border-radius: 9999px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 p-4 max-w-2xl mx-auto">

        <div class="font-bold text-emerald-400 text-xl">Branson 2026</div>
        <div class="flex gap-2 text-sm font-medium">
          <a href="index.html" class="px-5 py-2 rounded-2xl hover:bg-zinc-800 data-[active=true]:bg-emerald-900 data-[active=true]:text-emerald-400">Events</a>
          <a href="people-timeline.html" class="px-5 py-2 rounded-2xl hover:bg-zinc-800 data-[active=true]:bg-emerald-900 data-[active=true]:text-emerald-400">People</a>
          <a href="event-timeline.html" data-active="true" class="px-5 py-2 rounded-2xl hover:bg-zinc-800 data-[active=true]:bg-emerald-900 data-[active=true]:text-emerald-400">Timeline</a>
        </div>
      </div>
    </div>
    <p class="text-xs text-zinc-500 mb-8">Chronological timeline with duration bars (from Test Vacation Checklist.md) • Tap cards for full RSVP details</p>

    </div>

    <div id="timeline-list" class="space-y-4"></div>

    <p class="text-center text-zinc-500 text-xs mt-12">
        Tap Share → "Add to Home Screen" on iOS. iMessage is primary communication. Updated with visual duration bars.
    </p>

    <script>

            const btn = document.getElementById('toggle-btn');
            const text = document.getElementById('toggle-text');
            text.textContent = allExpanded ? 'Collapse All' : 'Expand All';
            document.querySelectorAll('details.event-card').forEach(details => {
                details.open = allExpanded;
            });
        }

        const eventsData = [
            {title: "Cave", date: "2026-05-23", priority: "medium", duration: 1.5, interested: ['Alex'], undecided: [], notInterested: ['Evie'], noResponse: ['Adrian','Ashlyn','Bee','Brian','Bug','David','Dez','Georgie','Jackson','Jacob','Jordan','Josh','Kevin','Lucy','McKinley','Mel','Mycah','Natalie','Rachel','Ray','Simran','Skylar','Tayden','Zach']},

            {title: "Mini Golf", date: "2026-05-28", priority: "low", duration: 0.75, interested: ['Ashlyn'], undecided: [], notInterested: ['Evie'], noResponse: ['Adrian','Alex','Bee','Brian','Bug','David','Dez','Georgie','Jackson','Jacob','Jordan','Josh','Kevin','Lucy','McKinley','Mel','Mycah','Natalie','Rachel','Ray','Simran','Skylar','Tayden','Zach']},
            {title: "Riverfront", date: "2026-05-28", priority: "medium", duration: 2, interested: [], undecided: [], notInterested: ['Evie'], noResponse: ['Adrian','Alex','Ashlyn','Bee','Brian','Bug','David','Dez','Georgie','Jackson','Jacob','Jordan','Josh','Kevin','Lucy','McKinley','Mel','Mycah','Natalie','Rachel','Ray','Simran','Skylar','Tayden','Zach']},
            {title: "Thrift Shop", date: "2026-05-28", priority: "low", duration: 2, interested: ['Ashlyn'], undecided: [], notInterested: ['Evie'], noResponse: ['Adrian','Alex','Bee','Brian','Bug','David','Dez','Georgie','Jackson','Jacob','Jordan','Josh','Kevin','Lucy','McKinley','Mel','Mycah','Natalie','Rachel','Ray','Simran','Skylar','Tayden','Zach']}
        ];

        function render() {
            const container = document.getElementById('timeline-list');
            const maxDuration = 6; // for scaling bars (Silver Dollar City, Dogwood)
            container.innerHTML = eventsData.map(event => {
                const pct = Math.min((event.duration / maxDuration) * 100, 100);
                const interestedHtml = event.interested.map(name => `<div>${name}</div>`).join('');
                const undecidedHtml = event.undecided.map(name => `<div>${name}</div>`).join('');
                const notInterestedHtml = event.notInterested.map(name => `<div>${name}</div>`).join('');
                const noResponseHtml = event.noResponse.map(name => `<div>${name}</div>`).join('');

                return `
                    <details class="event-card bg-zinc-900 border border-zinc-700 rounded-3xl">
                        <summary class="px-6 py-4 flex justify-between items-center cursor-pointer hover:bg-zinc-800">
                            <div class="flex-1">
                                <div class="font-semibold text-white">${event.title}</div>
                                <div class="text-emerald-400 text-sm">${event.date} • ${event.duration}h • ${event.priority} priority</div>
                                <div class="duration-bar-container">
                                    <div class="duration-bar" style="width: ${pct}%"></div>
                                </div>
                            </div>
                            <div class="text-xs bg-zinc-800 px-3 py-1 rounded-2xl flex items-center gap-3">
                                <span class="text-green-400">${event.interested.length}</span>
                                <span class="text-amber-400">${event.undecided.length}</span>
                                <span class="text-red-400">${event.notInterested.length}</span>
                                <span class="text-zinc-500">${event.noResponse.length}</span>
                            </div>
                        </summary>
                        <div class="px-6 pb-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-sm pt-2">
                            <div class="group">
                                <div class="group-title text-green-400">Interested (${event.interested.length})</div>
                                <div class="name-list text-green-300">${interestedHtml || '<div class="opacity-50">(none)</div>'}</div>
                            </div>
                            <div class="group">
                                <div class="group-title text-amber-400">Undecided (${event.undecided.length})</div>
                                <div class="name-list text-amber-300">${undecidedHtml || '<div class="opacity-50">(none)</div>'}</div>
                            </div>
                            <div class="group">
                                <div class="group-title text-red-400">Not Interested (${event.notInterested.length})</div>
                                <div class="name-list text-red-300">${notInterestedHtml || '<div class="opacity-50">(none)</div>'}</div>
                            </div>
                            <div class="group">
                                <div class="group-title text-zinc-500">No Response (${event.noResponse.length})</div>
                                <div class="name-list text-zinc-400">${noResponseHtml || '<div class="opacity-50">(none)</div>'}</div>
                            </div>
                        </div>
                    </details>
                `;
            }).join('');
        }

        function setupMobileCollapse() {
            if (window.innerWidth < 768) {
                document.querySelectorAll('details.event-card').forEach(details => {
                    details.removeAttribute('open');
                });
                allExpanded = false;
                document.getElementById('toggle-text').textContent = 'Expand All';
            }
        }

        window.onload = () => {
            render();
            setupMobileCollapse();
            window.addEventListener('resize', setupMobileCollapse);
        };
    </script>
</body>
</html>
