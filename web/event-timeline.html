<script>/* Theme loader -- inline to prevent flash-of-wrong-theme */
(function(){
  var m = localStorage.getItem('vacdash:v1:mode') || 'system';

<style>
.event-card {
  background: var(--color-surface);
  border: 1.5px solid var(--color-line);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-1);
  overflow: hidden;
  margin-bottom: 12px;
}
.event-card > summary {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  cursor: pointer;
  list-style: none;
  gap: 12px;
}
.event-card > summary::-webkit-details-marker { display: none; }
.event-card > summary:hover { background: color-mix(in srgb, var(--color-bg) 60%, transparent); }
.event-card__title { font-family: var(--font-display); font-weight: 700; font-size: var(--text-base); color: var(--color-ink); }
.event-card__meta { font-size: var(--text-sm); color: var(--color-ink-dim); margin-top: 2px; }
.event-card__chips { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; align-items: center; }
.event-card__body {
  padding: 0 18px 18px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  font-size: var(--text-sm);
}
@media (min-width: 720px) { .event-card__body { grid-template-columns: repeat(4, 1fr); } }
.event-card__group-title { font-weight: 700; margin-bottom: 6px; }
.event-card__name { padding: 2px 0; color: var(--color-ink-dim); }
.event-card__none { color: var(--color-ink-dim); opacity: 0.5; font-style: italic; }
.event-card__summary-main { flex: 1; min-width: 0; }
</style>
</head>

  <div id="timeline-list"></div>

            {title: "Titanic", date: "2026-05-25", priority: "high", duration: 1.5, interested: ['Ashlyn','Skylar'], undecided: [], notInterested: ['Evie'], noResponse: ['Adrian','Alex','Bee','Brian','Bug','David','Dez','Georgie','Jackson','Jacob','Jordan','Josh','Kevin','Lucy','McKinley','Mel','Mycah','Natalie','Rachel','Ray','Simran','Tayden','Zach']},
            {title: "Water Park", date: "2026-05-25", priority: "high", duration: 3, interested: ['Bee','Mycah','Tayden'], undecided: [], notInterested: ['Evie'], noResponse: ['Adrian','Alex','Ashlyn','Brian','Bug','David','Dez','Georgie','Jackson','Jacob','Jordan','Josh','Kevin','Lucy','McKinley','Mel','Natalie','Rachel','Ray','Simran','Skylar','Zach']},

            {title: "Cat Cafe", date: "2026-05-28", priority: "low", duration: 1, interested: [], undecided: [], notInterested: ['Evie'], noResponse: ['Adrian','Alex','Ashlyn','Bee','Brian','Bug','David','Dez','Georgie','Jackson','Jacob','Jordan','Josh','Kevin','Lucy','McKinley','Mel','Mycah','Natalie','Rachel','Ray','Simran','Skylar','Tayden','Zach']},

            {title: "Mini Golf", date: "2026-05-28", priority: "low", duration: 0.75, interested: ['Ashlyn'], undecided: [], notInterested: ['Evie'], noResponse: ['Adrian','Alex','Bee','Brian','Bug','David','Dez','Georgie','Jackson','Jacob','Jordan','Josh','Kevin','Lucy','McKinley','Mel','Mycah','Natalie','Rachel','Ray','Simran','Skylar','Tayden','Zach']},
            {title: "Riverfront", date: "2026-05-28", priority: "medium", duration: 2, interested: [], undecided: [], notInterested: ['Evie'], noResponse: ['Adrian','Alex','Ashlyn','Bee','Brian','Bug','David','Dez','Georgie','Jackson','Jacob','Jordan','Josh','Kevin','Lucy','McKinley','Mel','Mycah','Natalie','Rachel','Ray','Simran','Skylar','Tayden','Zach']},
            {title: "Thrift Shop", date: "2026-05-28", priority: "low", duration: 2, interested: ['Ashlyn'], undecided: [], notInterested: ['Evie'], noResponse: ['Adrian','Alex','Bee','Brian','Bug','David','Dez','Georgie','Jackson','Jacob','Jordan','Josh','Kevin','Lucy','McKinley','Mel','Mycah','Natalie','Rachel','Ray','Simran','Skylar','Tayden','Zach']}
        ];

        function render() {
            const container = document.getElementById('timeline-list');
            const maxDuration = 6;
            const yesStyle = 'color:var(--status-yes);border-color:color-mix(in srgb,var(--status-yes) 35%,var(--color-line))';
            const warnStyle = 'color:var(--warn);border-color:color-mix(in srgb,var(--warn) 35%,var(--color-line))';
            const noStyle = 'color:var(--status-no);border-color:color-mix(in srgb,var(--status-no) 35%,var(--color-line))';
            const dayLabels = {
                '2026-05-23': 'May 23 — Saturday',
                '2026-05-24': 'May 24 — Sunday',
                '2026-05-25': 'May 25 — Monday',
                '2026-05-26': 'May 26 — Tuesday',
                '2026-05-27': 'May 27 — Wednesday',
                '2026-05-28': 'May 28 — Thursday'
            };
            const nameCell = (n) => `<div class="event-card__name">${n}</div>`;
            const noneCell = '<div class="event-card__none">(none)</div>';

            const groups = {};
            eventsData.forEach(ev => {
                if (!groups[ev.date]) groups[ev.date] = [];
                groups[ev.date].push(ev);
            });
            const dates = Object.keys(groups).sort();

            const renderCard = (event) => {
                const pct = Math.min((event.duration / maxDuration) * 100, 100);
                return `
                    <details class="event-card">
                        <summary>
                            <div class="event-card__summary-main">
                                <div class="event-card__title">${event.title}</div>
                                <div class="event-card__meta">${event.duration}h • ${event.priority} priority</div>
                                <div class="duration-bar-wrap" style="margin-top:6px;height:6px;border-radius:var(--radius-pill);background:var(--color-line);overflow:hidden;">
                                    <div style="height:100%;width:${pct}%;background:var(--status-yes);border-radius:var(--radius-pill);"></div>
                                </div>
                            </div>
                            <div class="event-card__chips">
                                <span class="minichip" style="${yesStyle};font-size:13px;font-weight:800;">✓ ${event.interested.length}</span>
                                <span class="minichip" style="${warnStyle}">? ${event.undecided.length}</span>
                                <span class="minichip" style="${noStyle}">✗ ${event.notInterested.length}</span>
                                <span class="minichip">– ${event.noResponse.length}</span>
                            </div>
                        </summary>
                        <div class="event-card__body">
                            <div>
                                <div class="event-card__group-title" style="color:var(--status-yes)">Interested (${event.interested.length})</div>
                                ${event.interested.map(nameCell).join('') || noneCell}
                            </div>
                            <div>
                                <div class="event-card__group-title" style="color:var(--warn)">Undecided (${event.undecided.length})</div>
                                ${event.undecided.map(nameCell).join('') || noneCell}
                            </div>
                            <div>
                                <div class="event-card__group-title" style="color:var(--status-no)">Not Interested (${event.notInterested.length})</div>
                                ${event.notInterested.map(nameCell).join('') || noneCell}
                            </div>
                            <div>
                                <div class="event-card__group-title" style="color:var(--color-ink-dim)">No Response (${event.noResponse.length})</div>
                                ${event.noResponse.map(nameCell).join('') || noneCell}
                            </div>
                        </div>
                    </details>
                `;
            };

            container.innerHTML = dates.map(date => {
                const label = dayLabels[date] || date;
                const cards = groups[date].map(renderCard).join('');
                return `
                    <h2 style="font-family:var(--font-display);font-weight:800;font-size:var(--text-lg);color:var(--color-ink);margin:24px 0 10px;border-bottom:2px solid var(--color-line);padding-bottom:6px;">📅 ${label}</h2>
                    ${cards}
                `;
            }).join('');
        }

        function setupMobileCollapse() {
            if (window.innerWidth < 768) {
                document.querySelectorAll('details.event-card').forEach(details => {
                    details.removeAttribute('open');
                });
                allExpanded = false;
                document.getElementById('toggle-text').textContent = 'Expand All';
            }
        }

        window.onload = () => {
            render();
            setupMobileCollapse();
            window.addEventListener('resize', setupMobileCollapse);
        };
    </script>
</main>
<script>window.addEventListener('storage',function(e){if(e.key==='vacdash:v1:mode')document.documentElement.setAttribute('data-mode',e.newValue||'system')});</script>
<script>
(function(){
  function syncBadge(){
    var btn = document.getElementById('profile-btn');
    if (!btn) return;
    var u = ''; try { u = localStorage.getItem('vacdash:v1:user') || ''; } catch(e){}
    btn.setAttribute('data-unset', u ? 'false' : 'true');
  }
  syncBadge();
  window.addEventListener('storage', function(e){ if (e.key === 'vacdash:v1:user') syncBadge(); });
})();
</script>
</body>
